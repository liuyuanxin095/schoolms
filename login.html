<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>陽禾文理補習班管理系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
  <style>
    body { background-color: #f1f5f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 420px; text-align: center; }
    .login-logo { background: #eff6ff; color: var(--primary); width: 80px; height: 80px; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 20px auto; }
    .login-title { font-size: 22px; font-weight: bold; color: var(--text-main); margin: 0 0 8px 0; line-height: 1.4; }
    .login-subtitle { font-size: 14px; color: var(--text-light); margin-bottom: 30px; }
    .form-group { text-align: left; margin-bottom: 20px; }
    .form-group input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; box-sizing: border-box; transition: 0.2s; font-family: inherit; }
    .form-group input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    .btn-login { width: 100%; padding: 14px; font-size: 16px; border-radius: 8px; margin-top: 10px; cursor: pointer; border: none; font-weight: bold; background-color: var(--primary); color: white; transition: 0.2s; font-family: inherit; }
    .btn-login:hover { background-color: var(--primary-hover); transform: translateY(-1px); box-shadow: 0 4px 6px rgba(37,99,235,0.2); }
    .error-msg { color: #dc2626; background: #fee2e2; padding: 10px; border-radius: 6px; font-size: 14px; margin-bottom: 20px; display: none; }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-logo">
      <span class="material-symbols-outlined" style="font-size: 40px;">school</span>
    </div>
    
    <h1 class="login-title">陽禾語文文理短期補習班<br>管理系統</h1>
    
    <div class="login-subtitle">請輸入您的帳號密碼登入系統</div>

    <div class="error-msg" id="error-msg">帳號或密碼錯誤，請重試。</div>

    <form id="login-form">
      <div class="form-group">
        <label style="display:block; margin-bottom:8px; font-weight:600; color:var(--text-main);">Email 帳號</label>
        <input type="email" id="email" required placeholder="teacher@yanghe.tw">
      </div>
      <div class="form-group">
        <label style="display:block; margin-bottom:8px; font-weight:600; color:var(--text-main);">密碼</label>
        <input type="password" id="password" required placeholder="請輸入密碼">
      </div>
      
      <button type="submit" class="btn-login" id="btn-submit">系統登入</button>
    </form>
  </div>

  <script type="module" src="./login.js"></script>
</body>
</html>
