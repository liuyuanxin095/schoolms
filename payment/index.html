<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>繳費管理 - 補習班系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    /* 繳費狀態專屬標籤 */
    .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; display: inline-block; }
    .status-unpaid { background-color: #fee2e2; color: #b91c1c; } /* 紅色未繳 */
    .status-paid { background-color: #dcfce7; color: #15803d; }   /* 綠色已繳 */
    .amount-text { font-family: monospace; font-size: 16px; font-weight: bold; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left"><span class="material-symbols-outlined" style="color: var(--primary);">school</span><h1>補習班管理系統</h1></div>
    <a href="../index.html" class="back-btn"><span class="material-symbols-outlined">arrow_back</span>返回首頁</a>
  </div>

  <div class="container">
    <div class="card">
      <div class="toolbar">
        <h2 class="toolbar-title"><span class="material-symbols-outlined" style="color: #d97706;">payments</span>繳費單列表</h2>
        <button class="btn btn-primary" onclick="window.openFormModal()"><span class="material-symbols-outlined">add_card</span>開立收費單</button>
      </div>
      
      <div class="filter-bar">
        <span class="material-symbols-outlined" style="color: var(--text-light);">search</span>
        <input type="text" id="search-input" placeholder="搜尋學生、項目或班級...">
        <select id="status-filter">
          <option value="all">所有狀態</option>
          <option value="未繳">🔴 未繳款</option>
          <option value="已繳款">🟢 已繳款</option>
        </select>
      </div>
      
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>繳費學生</th>
              <th>收費項目 / 關聯班級</th>
              <th>應繳金額</th>
              <th>繳款狀態</th>
              <th>繳費方式 / 日期</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="payment-list">
            <tr><td colspan="6" style="text-align: center; color: var(--text-light); padding: 30px;">載入中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="form-modal">
    <div class="modal-content" style="max-width: 600px;">
      <span class="material-symbols-outlined modal-close" onclick="window.closeFormModal()">close</span>
      <h2 id="form-title" style="margin-top: 0; color: var(--primary);">開立收費單</h2>
      
      <form id="payment-form">
        <input type="hidden" id="payment-id">
        
        <div class="form-grid">
          <div class="form-group full-width">
            <label for="student_id">繳費學生 <span style="color:red">*</span></label>
            <select id="student_id" required>
              <option value="" disabled selected>載入中...</option>
            </select>
          </div>
          
          <div class="form-group full-width">
            <label for="title">收費項目名稱 <span style="color:red">*</span></label>
            <input type="text" id="title" required placeholder="例：113上學期 學費、教材費...">
          </div>
          
          <div class="form-group full-width">
            <label for="class_id">關聯班級 (選填)</label>
            <select id="class_id">
              <option value="">-- 無關聯班級 (獨立收費) --</option>
            </select>
          </div>
          
          <div class="form-group">
            <label for="amount">應繳金額 (NT$) <span style="color:red">*</span></label>
            <input type="number" id="amount" required min="0" value="0">
          </div>
          
          <div class="form-group">
            <label for="status">繳費狀態</label>
            <select id="status" required onchange="window.togglePaymentDetails()">
              <option value="未繳" selected>未繳款</option>
              <option value="已繳款">已繳款</option>
            </select>
          </div>

          <div class="form-group" id="method-group" style="display: none;">
            <label for="payment_method">繳費方式</label>
            <select id="payment_method">
              <option value="現金">現金</option>
              <option value="匯款">銀行匯款</option>
              <option value="信用卡">信用卡</option>
              <option value="LinePay">Line Pay</option>
            </select>
          </div>
          
          <div class="form-group" id="date-group" style="display: none;">
            <label for="payment_date">實際繳款日期</label>
            <input type="date" id="payment_date">
          </div>
        </div>

        <div class="actions" style="margin-top: 25px;">
          <button type="button" class="btn btn-cancel" onclick="window.closeFormModal()">取消</button>
          <button type="submit" class="btn btn-primary" id="submit-btn">儲存收費單</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
