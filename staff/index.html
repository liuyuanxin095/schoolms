<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教職員管理 - 補習班系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <style>
    :root { --primary: #2563eb; --primary-hover: #1d4ed8; --danger: #dc2626; --bg-color: #f3f4f6; --surface: #ffffff; --text-main: #1f2937; --text-light: #6b7280; --border: #e5e7eb; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; }
    
    .header { background-color: var(--surface); padding: 15px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header h1 { margin: 0; font-size: 20px; }
    .back-btn { text-decoration: none; color: var(--text-main); display: flex; align-items: gap: 5px; font-weight: 500; }
    
    .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
    .card { background-color: var(--surface); border-radius: 8px; border: 1px solid var(--border); padding: 24px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .toolbar-title { margin: 0; font-size: 20px; display: flex; align-items: center; gap: 8px; }
    .filter-bar { display: flex; gap: 10px; align-items: center; background: #f9fafb; padding: 12px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; }
    .filter-bar input, .filter-bar select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; outline: none; }
    .filter-bar input:focus { border-color: var(--primary); }
    
    .btn-primary { background-color: var(--primary); color: white; text-decoration: none; padding: 10px 16px; border-radius: 6px; display: inline-flex; align-items: center; gap: 6px; font-size: 14px; border: none; cursor: pointer; }
    
    table { width: 100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid var(--border); padding: 12px 16px; text-align: left; font-size: 14px; vertical-align: middle; }
    th { background-color: #f9fafb; font-weight: 600; color: var(--text-light); }
    
    .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background-color: #e5e7eb; }
    .staff-info { display: flex; align-items: center; gap: 12px; }
    .action-btns { display: flex; gap: 8px; }
    .btn-icon { background: none; border: 1px solid var(--border); padding: 6px; border-radius: 6px; cursor: pointer; color: var(--text-light); display: flex; align-items: center; text-decoration: none; }
    
    /* 角色標籤樣式 */
    .role-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
    .role-admin { background-color: #fee2e2; color: #b91c1c; }
    .role-manager { background-color: #e0e7ff; color: #4338ca; }
    .role-teacher { background-color: #dcfce7; color: #15803d; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left"><span class="material-symbols-outlined" style="color: var(--primary);">school</span><h1>補習班管理系統</h1></div>
    <a href="../index.html" class="back-btn"><span class="material-symbols-outlined">arrow_back</span>返回首頁</a>
  </div>

  <div class="container">
    <div class="card">
      <div class="toolbar">
        <h2 class="toolbar-title"><span class="material-symbols-outlined">badge</span>教職員名單</h2>
        <a href="./add.html" class="btn-primary"><span class="material-symbols-outlined">person_add</span>新增教職員</a>
      </div>
      
      <div class="filter-bar">
        <span class="material-symbols-outlined" style="color: var(--text-light);">search</span>
        <input type="text" id="search-input" placeholder="搜尋姓名或電話..." style="flex-grow: 1;">
        <select id="role-filter">
          <option value="all">所有職務</option>
          <option value="admin">管理員</option>
          <option value="manager">主任</option>
          <option value="teacher">教師</option>
        </select>
        <select id="branch-filter">
          <option value="all">所有分校</option>
        </select>
      </div>
      
      <table>
        <thead>
          <tr>
            <th>教職員</th>
            <th>職務</th>
            <th>所屬分校</th>
            <th>聯絡電話</th>
            <th>薪資設定</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="staff-list">
          <tr><td colspan="6" style="text-align: center; color: var(--text-light); padding: 30px;">載入中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
