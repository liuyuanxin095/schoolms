<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教職員管理 - 補習班系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>

  <main class="main-wrapper">
    <header class="header">
      <div class="header-left">
        <span class="material-symbols-outlined" style="font-size: 28px; color: var(--primary);">badge</span>
        <h1>教職員管理</h1>
      </div>
      <div class="header-right">
        <span style="font-size: 14px; color: var(--text-light); font-weight: 600;" id="header-date">載入中...</span>
      </div>
    </header>

    <div class="container">
      <div class="card">
        <div class="toolbar">
          <h2 class="toolbar-title"><span class="material-symbols-outlined">badge</span>教職員列表</h2>
          <button class="btn btn-primary" onclick="window.openFormModal()"><span class="material-symbols-outlined">add</span>新增教職員</button>
        </div>
        
        <div class="filter-bar">
          <span class="material-symbols-outlined" style="color: var(--text-light);">search</span>
          <input type="text" id="search-input" placeholder="搜尋姓名...">
          <select id="role-filter">
            <option value="all">所有職務</option>
            <option value="teacher">教師</option>
            <option value="admin">行政/櫃檯</option>
            <option value="manager">主任/主管</option>
          </select>
        </div>
        
        <div class="table-responsive">
          <table>
            <thead>
              <tr><th>姓名</th><th>職務角色</th><th>聯絡電話</th><th>主要分校</th><th>操作</th></tr>
            </thead>
            <tbody id="staff-list">
              <tr><td colspan="5" style="text-align: center; color: var(--text-light); padding: 30px;">載入中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <div class="modal-overlay" id="form-modal">
    <div class="modal-content" style="max-width: 500px;">
      <span class="material-symbols-outlined modal-close" onclick="window.closeFormModal()">close</span>
      <h2 id="form-title" style="margin-top: 0; color: var(--primary);">新增教職員</h2>
      <form id="staff-form">
        <input type="hidden" id="staff-id">
        <div class="form-grid">
          <div class="form-group"><label>姓名 <span style="color:red">*</span></label><input type="text" id="name" required placeholder="例：王大明"></div>
          <div class="form-group">
            <label>職務角色 <span style="color:red">*</span></label>
            <select id="role" required>
              <option value="teacher">教師</option>
              <option value="admin">行政/櫃檯</option>
              <option value="manager">主任/主管</option>
            </select>
          </div>
          <div class="form-group full-width"><label>主要所屬分校 <span style="color:red">*</span></label><select id="branch_id" required><option value="" disabled selected>載入中...</option></select></div>
          <div class="form-group full-width"><label>聯絡電話</label><input type="text" id="phone" placeholder="手機或市話"></div>
        </div>
        <div class="actions" style="margin-top: 25px;">
          <button type="button" class="btn btn-cancel" onclick="window.closeFormModal()">取消</button>
          <button type="submit" class="btn btn-primary" id="submit-btn">儲存資料</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
  <script>document.getElementById('header-date').textContent = new Date().toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });</script>
</body>
</html>
