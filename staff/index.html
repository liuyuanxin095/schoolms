<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人事管理系統 - 陽禾文理補習班管理系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <main class="main-wrapper">
    <header class="header">
      <div class="header-left">
        <span class="material-symbols-outlined" style="font-size: 28px; color: var(--primary);">badge</span>
        <h1>人事管理系統</h1>
      </div>
      <div class="header-right"><span style="font-size: 14px; color: var(--text-light); font-weight: 600;" id="header-date">載入中...</span></div>
    </header>

    <div class="container">
      <div class="card">
        <div class="toolbar">
          <h2 class="toolbar-title"><span class="material-symbols-outlined">groups_3</span>人事檔案列表</h2>
          <button class="btn btn-primary" onclick="window.openFormModal()"><span class="material-symbols-outlined">person_add</span>新增教職員</button>
        </div>
        
        <div class="filter-bar">
          <span class="material-symbols-outlined" style="color: var(--text-light);">search</span>
          <input type="text" id="search-input" placeholder="搜尋姓名或編號...">
          <select id="status-filter">
            <option value="all">所有狀態</option>
            <option value="在職">在職中</option>
            <option value="離職">已離職</option>
          </select>
        </div>
        
        <div class="table-responsive">
          <table>
            <thead><tr><th>照片與姓名 (編號/身分證)</th><th>狀態</th><th>聯絡電話</th><th>到職日期</th><th>主要分校</th><th>操作</th></tr></thead>
            <tbody id="staff-list"><tr><td colspan="6" style="text-align: center; color: var(--text-light); padding: 30px;">載入中...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <div class="modal-overlay" id="form-modal">
    <div class="modal-content" style="max-width: 600px;">
      <span class="material-symbols-outlined modal-close" onclick="window.closeFormModal()">close</span>
      <h2 id="form-title" style="margin-top: 0; color: var(--primary);">新增人事檔案</h2>
      
      <form id="staff-form">
        <input type="hidden" id="staff-id">
        <div style="display: flex; gap: 20px; align-items: center; margin-bottom: 20px;">
          <img id="avatar-preview" src="https://via.placeholder.com/60" style="width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border);">
          <div><label style="font-size: 13px; color: var(--text-light); display: block; margin-bottom: 5px;">上傳照片 (選填)</label><input type="file" id="photo" accept="image/*" onchange="window.previewPhoto(event)"></div>
        </div>

        <div class="form-tabs">
          <button type="button" class="form-tab active" id="tab-btn-basic" onclick="window.switchFormTab('basic')">基本資料</button>
          <button type="button" class="form-tab" id="tab-btn-salary" onclick="window.switchFormTab('salary')">薪資與狀態</button>
        </div>

        <div id="tab-basic" class="form-tab-content active">
          <div class="form-grid">
            <div class="form-group"><label>人員姓名 <span style="color:red">*</span></label><input type="text" id="name" required></div>
            <div class="form-group"><label>人事編號</label><input type="text" id="staff_number" placeholder="例：T001"></div>
            <div class="form-group"><label>身分證字號</label><input type="text" id="id_number"></div>
            <div class="form-group"><label>本人手機</label><input type="text" id="phone"></div>
            <div class="form-group"><label>主要所屬分校 <span style="color:red">*</span></label><select id="branch_id" required><option value="" disabled selected>載入中...</option></select></div>
            <div class="form-group"><label>支援分校 (可多選，按住 Ctrl)</label><select id="branch_ids" multiple style="height: 70px;"></select></div>
            <div class="form-group"><label>緊急聯絡人</label><input type="text" id="emergency_contact"></div>
            <div class="form-group"><label>緊急聯絡電話</label><input type="text" id="emergency_phone"></div>
            <div class="form-group full-width"><label>通訊地址</label><input type="text" id="address"></div>
          </div>
        </div>

        <div id="tab-salary" class="form-tab-content">
          <div class="form-grid">
            <div class="form-group"><label>在職狀態</label><select id="status"><option value="在職">在職</option><option value="離職">離職</option></select></div>
            <div class="form-group"><label>到職日期</label><input type="date" id="hire_date"></div>
            <div class="form-group full-width" style="border-top: 1px dashed var(--border); margin-top: 10px; padding-top: 15px;">
              <label style="color: var(--primary);">薪資計算參數設定 (HR專用)</label>
            </div>
            <div class="form-group"><label>固定底薪</label><input type="number" id="base_salary" value="0"></div>
            <div class="form-group"><label>授課時薪</label><input type="number" id="hourly_rate" value="0"></div>
          </div>
        </div>

        <div class="actions" style="margin-top: 25px;"><button type="button" class="btn btn-cancel" onclick="window.closeFormModal()">取消</button><button type="submit" class="btn btn-primary" id="submit-btn">儲存資料</button></div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="custom-dialog" style="z-index: 9999;"><div class="modal-content" style="max-width: 400px; text-align: center; padding: 30px;"><div id="dialog-icon" style="margin-bottom: 15px;"></div><h3 id="dialog-title" style="margin-top: 0; color: var(--text-main); font-size: 20px;">提示</h3><p id="dialog-message" style="color: var(--text-light); margin-bottom: 25px; line-height: 1.5; font-size: 15px;"></p><div style="display: flex; gap: 10px; justify-content: center;"><button class="btn btn-cancel" id="dialog-btn-cancel" style="display: none;">取消</button><button class="btn btn-primary" id="dialog-btn-confirm">確定</button></div></div></div>

  <script type="module" src="./app.js"></script>
  <script>document.getElementById('header-date').textContent = new Date().toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });</script>
</body>
</html>
