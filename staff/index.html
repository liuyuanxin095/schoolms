<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教職員名冊 (HR) - 陽禾文理補習班管理系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>

  <main class="main-wrapper">
    <header class="header">
      <div class="header-left">
        <span class="material-symbols-outlined" style="font-size: 28px; color: var(--primary);">badge</span>
        <h1>教職員名冊 (HR)</h1>
      </div>
      <div class="header-right"><span style="font-size: 14px; color: var(--text-light); font-weight: 600;" id="header-date">載入中...</span></div>
    </header>

    <div class="container">
      <div class="card">
        <div class="toolbar">
          <h2 class="toolbar-title"><span class="material-symbols-outlined">groups_3</span>人事檔案列表</h2>
          <button class="btn btn-primary" onclick="window.openFormModal()"><span class="material-symbols-outlined">person_add</span>新增教職員</button>
        </div>
        
        <div class="filter-bar">
          <span class="material-symbols-outlined" style="color: var(--text-light);">search</span>
          <input type="text" id="search-input" placeholder="搜尋姓名或電話...">
          <select id="status-filter">
            <option value="all">所有狀態</option>
            <option value="在職">在職中</option>
            <option value="離職">已離職</option>
          </select>
        </div>
        
        <div class="table-responsive">
          <table>
            <thead><tr><th>姓名 (身分證)</th><th>狀態</th><th>聯絡電話</th><th>到職日期</th><th>主要分校</th><th>操作</th></tr></thead>
            <tbody id="staff-list"><tr><td colspan="6" style="text-align: center; color: var(--text-light); padding: 30px;">載入中...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <div class="modal-overlay" id="form-modal">
    <div class="modal-content" style="max-width: 600px;">
      <span class="material-symbols-outlined modal-close" onclick="window.closeFormModal()">close</span>
      <h2 id="form-title" style="margin-top: 0; color: var(--primary);">新增教職員人事檔案</h2>
      
      <form id="staff-form">
        <input type="hidden" id="staff-id">
        <div class="form-grid">
          <div class="form-group"><label>人員姓名 <span style="color:red">*</span></label><input type="text" id="name" required></div>
          <div class="form-group"><label>身分證字號</label><input type="text" id="id_number" placeholder="身分證字號"></div>
          
          <div class="form-group"><label>主要所屬分校 <span style="color:red">*</span></label><select id="branch_id" required><option value="" disabled selected>載入中...</option></select></div>
          <div class="form-group"><label>到職日期</label><input type="date" id="hire_date"></div>
          
          <div class="form-group"><label>本人手機</label><input type="text" id="phone" placeholder="手機號碼"></div>
          <div class="form-group"><label>在職狀態</label><select id="status"><option value="在職">在職</option><option value="離職">離職</option></select></div>

          <div class="form-group"><label>緊急聯絡人</label><input type="text" id="emergency_contact" placeholder="姓名"></div>
          <div class="form-group"><label>緊急聯絡電話</label><input type="text" id="emergency_phone" placeholder="電話"></div>
          
          <div class="form-group full-width"><label>通訊地址</label><input type="text" id="address" placeholder="詳細地址"></div>
        </div>
        <div class="actions" style="margin-top: 25px;"><button type="button" class="btn btn-cancel" onclick="window.closeFormModal()">取消</button><button type="submit" class="btn btn-primary" id="submit-btn">儲存資料</button></div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="custom-dialog" style="z-index: 9999;"><div class="modal-content" style="max-width: 400px; text-align: center; padding: 30px;"><div id="dialog-icon" style="margin-bottom: 15px;"></div><h3 id="dialog-title" style="margin-top: 0; color: var(--text-main); font-size: 20px;">提示</h3><p id="dialog-message" style="color: var(--text-light); margin-bottom: 25px; line-height: 1.5; font-size: 15px;"></p><div style="display: flex; gap: 10px; justify-content: center;"><button class="btn btn-cancel" id="dialog-btn-cancel" style="display: none;">取消</button><button class="btn btn-primary" id="dialog-btn-confirm">確定</button></div></div></div>

  <script type="module" src="./app.js"></script>
  <script>document.getElementById('header-date').textContent = new Date().toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });</script>
</body>
</html>
