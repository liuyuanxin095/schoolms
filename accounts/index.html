<!DOCTYPE html>
<html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>系統帳號管理 - 陽禾文理補習班</title><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" /><link rel="stylesheet" href="../style.css" /></head>
<body>
  <main class="main-wrapper">
    <header class="header"><div class="header-left"><span class="material-symbols-outlined" style="color:var(--primary); font-size:28px;">manage_accounts</span><h1>系統帳號管理</h1></div></header>
    <div class="container">
      <div class="card">
        <div class="toolbar"><h2 class="toolbar-title"><span class="material-symbols-outlined">key</span>系統存取帳號列表</h2><button class="btn btn-primary" onclick="window.openAccountModal()"><span class="material-symbols-outlined">add</span>開通新帳號</button></div>
        <div class="table-responsive"><table><thead><tr><th>顯示名稱 (綁定人事)</th><th>登入 Email</th><th>系統權限</th><th>所屬分校</th><th>操作</th></tr></thead><tbody id="account-list"><tr><td colspan="5" style="text-align:center;">載入中...</td></tr></tbody></table></div>
      </div>
    </div>
  </main>

  <div class="modal-overlay" id="account-modal"><div class="modal-content" style="max-width:500px;"><span class="material-symbols-outlined modal-close" onclick="window.closeAccountModal()">close</span><h2 style="margin-top:0; color:var(--primary);">建立新帳號</h2>
      <form id="account-form">
        <div class="form-grid" style="grid-template-columns: 1fr;">
          <div class="form-group"><label>登入 Email <span style="color:red">*</span></label><input type="email" id="email" required></div>
          <div class="form-group"><label>預設密碼 (若留空預設為隨機8碼)</label><input type="text" id="password" placeholder="輸入密碼或留空"></div>
          <div class="form-group"><label>顯示名稱 <span style="color:red">*</span></label><input type="text" id="acc_name" required></div>
          <div class="form-group"><label>所屬分校 <span style="color:red">*</span></label><select id="branch_id" required></select></div>
          <div class="form-group"><label>系統權限 <span style="color:red">*</span></label><select id="role" required><option value="teacher">授課教師</option><option value="admin">分校櫃檯</option><option value="manager">分校主任</option><option value="superadmin">總部管理員</option></select></div>
        </div>
        <div class="actions" style="margin-top:20px;"><button type="submit" class="btn btn-primary" id="submit-btn" style="width:100%;">建立帳號</button></div>
      </form>
  </div></div>

  <div class="modal-overlay" id="custom-dialog"><div class="modal-content" style="max-width:400px; text-align:center; padding:30px;"><div id="dialog-icon"></div><h3 id="dialog-title" style="margin-top:0;">提示</h3><p id="dialog-message" style="color:var(--text-light);"></p><div style="display:flex; gap:10px; justify-content:center;"><button class="btn btn-cancel" id="dialog-btn-cancel" style="display:none;">取消</button><button class="btn btn-primary" id="dialog-btn-confirm">確定</button></div></div></div>
  <script type="module" src="./app.js"></script>
</body></html>
