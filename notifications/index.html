<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>班級通知推播 - 補習班系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    .view-section { display: none; animation: fadeIn 0.3s ease; }
    .view-section.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .view-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid var(--border); justify-content: space-between; }
    .view-title { font-size: 24px; font-weight: bold; color: var(--text-main); margin: 0; }

    /* 左右雙欄排版 (左編輯、右名單) */
    .editor-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
    @media (max-width: 992px) { .editor-layout { grid-template-columns: 1fr; } } 

    /* 圖片預覽框 */
    .image-upload-box { border: 2px dashed var(--border); border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; transition: 0.2s; background: var(--input-bg); position: relative; overflow: hidden; }
    .image-upload-box:hover { border-color: var(--primary); background: #eff6ff; }
    .image-preview { width: 100%; max-height: 200px; object-fit: contain; display: none; margin-top: 10px; border-radius: 4px; }
    
    /* 右側篩選與名單區 */
    .filter-section { display: flex; gap: 10px; background: var(--input-bg); padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--border); }
    .filter-section select { flex: 1; padding: 8px; border: 1px solid var(--border); border-radius: 6px; }
    
    .roster-container { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .roster-header { background: #f8fafc; padding: 12px 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-weight: 600; }
    .roster-list { max-height: 400px; overflow-y: auto; background: white; }
    .roster-item { display: flex; align-items: center; gap: 12px; padding: 10px 15px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; user-select: none; }
    .roster-item:hover { background: #eff6ff; }
    .roster-item:last-child { border-bottom: none; }
    .roster-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left"><span class="material-symbols-outlined" style="color: var(--primary);">school</span><h1>補習班管理系統</h1></div>
    <a href="../index.html" class="back-btn"><span class="material-symbols-outlined">arrow_back</span>返回首頁</a>
  </div>

  <div class="container">
    
    <div id="view-list" class="view-section active">
      <div class="view-header">
        <div style="display: flex; align-items: center; gap: 15px;">
          <span class="material-symbols-outlined" style="font-size: 32px; color: #8b5cf6;">campaign</span>
          <h2 class="view-title">通知發送紀錄</h2>
        </div>
        <button class="btn btn-primary" onclick="window.switchView('editor')"><span class="material-symbols-outlined">send</span>建立新通知</button>
      </div>

      <div class="card" style="padding: 0; border: none; box-shadow: none;">
        <div class="table-responsive" style="border: 1px solid var(--border); border-radius: 8px;">
          <table>
            <thead>
              <tr><th>發送時間</th><th>通知主旨 / 內文摘要</th><th>附圖</th><th>發送人數</th><th>操作</th></tr>
            </thead>
            <tbody id="notification-list">
              <tr><td colspan="5" style="text-align: center; color: var(--text-light); padding: 30px;">載入中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="view-editor" class="view-section">
      <div class="view-header" style="background: var(--surface); padding: 20px; border-radius: 8px; border: 1px solid var(--border);">
        <div style="display: flex; align-items: center; gap: 15px;">
          <button class="btn btn-cancel" onclick="window.switchView('list')"><span class="material-symbols-outlined">arrow_back</span>放棄並返回</button>
          <h2 class="view-title" id="editor-title">發送新通知</h2>
        </div>
        <button class="btn btn-primary" id="btn-send" onclick="window.sendNotification()" style="font-size: 16px; padding: 12px 24px; background: #8b5cf6;"><span class="material-symbols-outlined">send</span> 確認發送</button>
      </div>

      <div class="editor-layout">
        <div class="card" style="position: sticky; top: 20px;">
          <h3 style="margin-top: 0; color: var(--text-main); font-size: 16px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">通知內容設定</h3>
          <form id="notify-form" class="form-grid" style="grid-template-columns: 1fr;">
            <div class="form-group">
              <label>通知主旨 <span style="color:red">*</span></label>
              <input type="text" id="noti_title" required placeholder="例：清明連假停課通知">
            </div>
            
            <div class="form-group full-width">
              <label>上傳附圖 (選填)</label>
              <label class="image-upload-box">
                <input type="file" id="noti_image" accept="image/*" style="display: none;" onchange="window.previewImage(event)">
                <div id="upload-hint" style="color: var(--text-light);"><span class="material-symbols-outlined" style="font-size: 32px; display: block; margin-bottom: 5px;">image</span> 點擊上傳圖片</div>
                <img id="image-preview" class="image-preview" src="">
              </label>
            </div>

            <div class="form-group full-width">
              <label>詳細內文 <span style="color:red">*</span></label>
              <textarea id="noti_content" rows="8" required style="width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-family: inherit; resize: vertical;" placeholder="請輸入要發送給家長與學生的詳細內容..."></textarea>
            </div>
          </form>
        </div>

        <div class="card">
          <h3 style="margin-top: 0; color: var(--text-main); font-size: 16px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">選擇發送對象</h3>
          
          <div class="filter-section">
            <select id="filter-branch" onchange="window.handleFilterChange()">
              <option value="all">所有分校 (全體發送)</option>
            </select>
            <select id="filter-class" onchange="window.handleFilterChange()">
              <option value="all">不限班級</option>
            </select>
          </div>

          <div class="roster-container">
            <div class="roster-header">
              <label style="cursor: pointer; display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="select-all" onchange="window.toggleSelectAll()"> 全選篩選名單
              </label>
              <span style="font-size: 13px; color: var(--text-light);">已選：<strong id="selected-count" style="color: var(--primary);">0</strong> 人</span>
            </div>
            <div class="roster-list" id="student-list">
              <div style="padding: 30px; text-align: center; color: var(--text-light);">載入名單中...</div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
