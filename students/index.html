<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>學生管理 - 補習班系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <style>
    :root { --primary: #2563eb; --primary-hover: #1d4ed8; --danger: #dc2626; --bg-color: #f3f4f6; --surface: #ffffff; --text-main: #1f2937; --text-light: #6b7280; --border: #e5e7eb; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; }
    
    .header { background-color: var(--surface); padding: 15px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header h1 { margin: 0; font-size: 20px; }
    .back-btn { text-decoration: none; color: var(--text-main); display: flex; align-items: center; gap: 5px; font-weight: 500; }
    
    .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
    .card { background-color: var(--surface); border-radius: 8px; border: 1px solid var(--border); padding: 24px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    
    /* 篩選器與工具列 */
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .toolbar-title { margin: 0; font-size: 20px; display: flex; align-items: center; gap: 8px; }
    .filter-bar { display: flex; gap: 10px; align-items: center; background: #f9fafb; padding: 12px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; }
    .filter-bar input, .filter-bar select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; outline: none; }
    .filter-bar input:focus { border-color: var(--primary); }
    
    .btn-primary { background-color: var(--primary); color: white; text-decoration: none; padding: 10px 16px; border-radius: 6px; display: inline-flex; align-items: center; gap: 6px; font-size: 14px; border: none; cursor: pointer; }
    
    table { width: 100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid var(--border); padding: 12px 16px; text-align: left; font-size: 14px; vertical-align: middle; }
    th { background-color: #f9fafb; font-weight: 600; color: var(--text-light); }
    
    .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background-color: #e5e7eb; }
    .student-info { display: flex; align-items: center; gap: 12px; }
    .action-btns { display: flex; gap: 8px; }
    .btn-icon { background: none; border: 1px solid var(--border); padding: 6px; border-radius: 6px; cursor: pointer; color: var(--text-light); display: flex; align-items: center; text-decoration: none; }
    
    /* 浮動詳細視窗 (Modal) */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: var(--surface); padding: 30px; border-radius: 12px; width: 100%; max-width: 500px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); position: relative; }
    .modal-close { position: absolute; top: 20px; right: 20px; cursor: pointer; color: var(--text-light); }
    .modal-header { display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 20px; }
    .modal-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; font-size: 14px; }
    .detail-item { display: flex; flex-direction: column; gap: 4px; }
    .detail-label { color: var(--text-light); font-size: 12px; }
    .detail-value { font-weight: 500; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left"><span class="material-symbols-outlined" style="color: var(--primary);">school</span><h1>補習班管理系統</h1></div>
    <a href="../index.html" class="back-btn"><span class="material-symbols-outlined">arrow_back</span>返回首頁</a>
  </div>

  <div class="container">
    <div class="card">
      <div class="toolbar">
        <h2 class="toolbar-title"><span class="material-symbols-outlined">group</span>學生名單</h2>
        <a href="./add.html" class="btn-primary"><span class="material-symbols-outlined">person_add</span>新增學生</a>
      </div>
      
      <div class="filter-bar">
        <span class="material-symbols-outlined" style="color: var(--text-light);">search</span>
        <input type="text" id="search-input" placeholder="搜尋姓名或學號..." style="flex-grow: 1;">
        <select id="branch-filter">
          <option value="all">所有分校</option>
          </select>
      </div>
      
      <table>
        <thead>
          <tr>
            <th>學生</th>
            <th>學號</th>
            <th>分校</th>
            <th>就讀學校</th>
            <th>年級</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="student-list">
          <tr><td colspan="6" style="text-align: center; color: var(--text-light); padding: 30px;">載入中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="modal-overlay" id="detail-modal">
    <div class="modal-content">
      <span class="material-symbols-outlined modal-close" onclick="closeModal()">close</span>
      <div class="modal-header">
        <img src="" id="modal-avatar" class="modal-avatar">
        <div>
          <h2 id="modal-name" style="margin: 0 0 5px 0;">-</h2>
          <span id="modal-branch" style="background: #e0e7ff; color: var(--primary); padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 500;">-</span>
        </div>
      </div>
      <div class="detail-grid">
        <div class="detail-item"><span class="detail-label">學號</span><span class="detail-value" id="modal-student-no">-</span></div>
        <div class="detail-item"><span class="detail-label">身分證字號</span><span class="detail-value" id="modal-id-no">-</span></div>
        <div class="detail-item"><span class="detail-label">生日</span><span class="detail-value" id="modal-birthday">-</span></div>
        <div class="detail-item"><span class="detail-label">就讀學校</span><span class="detail-value" id="modal-school">-</span></div>
        <div class="detail-item"><span class="detail-label">年級</span><span class="detail-value" id="modal-grade">-</span></div>
        <div class="detail-item"><span class="detail-label">家長姓名</span><span class="detail-value" id="modal-parent">-</span></div>
        <div class="detail-item"><span class="detail-label">聯絡電話</span><span class="detail-value" id="modal-phone">-</span></div>
      </div>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
