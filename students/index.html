<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>學生管理 - 補習班系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>

  <div class="header">
    <div class="header-left"><span class="material-symbols-outlined" style="color: var(--primary);">school</span><h1>補習班管理系統</h1></div>
    <a href="../index.html" class="back-btn"><span class="material-symbols-outlined">arrow_back</span>返回首頁</a>
  </div>

  <div class="container">
    <div class="card">
      <div class="toolbar">
        <h2 class="toolbar-title"><span class="material-symbols-outlined">group</span>學生列表</h2>
        <button class="btn btn-primary" onclick="window.openFormModal()"><span class="material-symbols-outlined">add</span>新增學生</button>
      </div>
      
      <div class="filter-bar">
        <span class="material-symbols-outlined" style="color: var(--text-light);">search</span>
        <input type="text" id="search-input" placeholder="搜尋姓名或學號...">
        <select id="branch-filter"><option value="all">所有分校</option></select>
      </div>
      
      <div class="table-responsive">
        <table>
          <thead><tr><th>姓名 (學號)</th><th>所屬分校</th><th>聯絡人</th><th>聯絡電話</th><th>操作</th></tr></thead>
          <tbody id="student-list"><tr><td colspan="5" style="text-align: center; color: var(--text-light); padding: 30px;">載入中...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="form-modal">
    <div class="modal-content" style="max-width: 500px;">
      <span class="material-symbols-outlined modal-close" onclick="window.closeFormModal()">close</span>
      <h2 id="form-title" style="margin-top: 0; color: var(--primary);">新增學生</h2>
      <form id="student-form">
        <input type="hidden" id="student-id">
        <div class="form-grid">
          <div class="form-group"><label>學生姓名 <span style="color:red">*</span></label><input type="text" id="name" required></div>
          <div class="form-group"><label>學號</label><input type="text" id="student_number" placeholder="例：SD1001"></div>
          <div class="form-group full-width"><label>所屬分校 <span style="color:red">*</span></label><select id="branch_id" required><option value="" disabled selected>載入中...</option></select></div>
          <div class="form-group"><label>緊急聯絡人</label><input type="text" id="contact_person"></div>
          <div class="form-group"><label>聯絡電話</label><input type="text" id="contact_phone"></div>
        </div>
        <div class="actions" style="margin-top: 25px;"><button type="button" class="btn btn-cancel" onclick="window.closeFormModal()">取消</button><button type="submit" class="btn btn-primary" id="submit-btn">儲存</button></div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="attendance-modal">
    <div class="modal-content" style="max-width: 600px; background: #f9fafb;">
      <span class="material-symbols-outlined modal-close" onclick="window.closeAttendanceModal()">close</span>
      <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 2px solid var(--border);">
        <div><h2 id="att-student-name" style="margin: 0 0 5px 0; color: var(--primary);">學生姓名</h2><div style="color: var(--text-light); font-size: 14px;">個人考勤紀錄歷史</div></div>
        <button class="btn btn-primary" onclick="window.openLeaveModal()" style="background: #f59e0b; border: none;"><span class="material-symbols-outlined">medical_information</span> 登記請假</button>
      </div>
      <div style="background: white; border: 1px solid var(--border); border-radius: 8px; max-height: 350px; overflow-y: auto;">
        <table style="margin: 0; width: 100%;">
          <thead style="position: sticky; top: 0; background: var(--input-bg);"><tr><th>日期</th><th>狀態</th><th>進班時間</th><th>離班時間 / 事由</th></tr></thead>
          <tbody id="att-history-list"><tr><td colspan="4" style="text-align: center; padding: 20px;">載入中...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="leave-modal" style="z-index: 1000;">
    <div class="modal-content" style="max-width: 400px;">
      <span class="material-symbols-outlined modal-close" onclick="window.closeLeaveModal()">close</span>
      <h2 style="margin-top: 0; color: #b45309;"><span class="material-symbols-outlined" style="vertical-align: middle;">medical_information</span> 登記請假</h2>
      <form id="leave-form">
        <div class="form-grid" style="grid-template-columns: 1fr;">
          <div class="form-group"><label>請假日期 <span style="color:red">*</span></label><input type="date" id="leave-date" required></div>
          <div class="form-group"><label>請假事由</label><input type="text" id="leave-reason" placeholder="例：病假、事假、學校活動..."></div>
        </div>
        <div class="actions" style="margin-top: 25px;"><button type="button" class="btn btn-cancel" onclick="window.closeLeaveModal()">取消</button><button type="submit" class="btn btn-primary" style="background: #d97706; border: none;">確認登記</button></div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="custom-dialog" style="z-index: 9999;">
    <div class="modal-content" style="max-width: 400px; text-align: center; padding: 30px;">
      <div id="dialog-icon" style="margin-bottom: 15px;"></div>
      <h3 id="dialog-title" style="margin-top: 0; color: var(--text-main); font-size: 20px;">提示</h3>
      <p id="dialog-message" style="color: var(--text-light); margin-bottom: 25px; line-height: 1.5; font-size: 15px;"></p>
      <div style="display: flex; gap: 10px; justify-content: center;"><button class="btn btn-cancel" id="dialog-btn-cancel" style="display: none;">取消</button><button class="btn btn-primary" id="dialog-btn-confirm">確定</button></div>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
