<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>學生管理 - 補習班系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
  <style>.current-photo-preview { display: flex; align-items: center; gap: 10px; margin-top: 8px; font-size: 13px; color: var(--text-light); } .current-photo-preview img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); }</style>
</head>
<body>

  <div class="header">
    <div class="header-left"><span class="material-symbols-outlined" style="color: var(--primary);">school</span><h1>補習班管理系統</h1></div>
    <a href="../index.html" class="back-btn"><span class="material-symbols-outlined">arrow_back</span>返回首頁</a>
  </div>

  <div class="container">
    <div class="card">
      <div class="toolbar">
        <h2 class="toolbar-title"><span class="material-symbols-outlined">group</span>學生名單</h2>
        <button class="btn btn-primary" onclick="window.openFormModal()"><span class="material-symbols-outlined">person_add</span>新增學生</button>
      </div>
      
      <div class="filter-bar">
        <span class="material-symbols-outlined" style="color: var(--text-light);">search</span>
        <input type="text" id="search-input" placeholder="搜尋姓名或學號...">
        <select id="branch-filter"><option value="all">所有分校</option></select>
      </div>
      
      <div class="table-responsive">
        <table>
          <thead>
            <tr><th>學生</th><th>學號</th><th>分校</th><th>就讀學校</th><th>年級</th><th>操作</th></tr>
          </thead>
          <tbody id="student-list">
            <tr><td colspan="6" style="text-align: center; color: var(--text-light); padding: 30px;">載入中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="detail-modal">
    <div class="modal-content">
      <span class="material-symbols-outlined modal-close" onclick="window.closeDetailModal()">close</span>
      <div class="header" style="padding: 0; border: none; margin-bottom: 20px; justify-content: flex-start; gap: 15px;">
        <img src="" id="modal-avatar" class="avatar" style="width: 70px; height: 70px;">
        <div>
          <h2 id="modal-name" style="margin: 0 0 5px 0;">-</h2>
          <span id="modal-branch" style="background: #e0e7ff; color: var(--primary); padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 500;">-</span>
        </div>
      </div>
      <div class="section-title" style="margin-top: 0;">詳細資料</div>
      <div class="form-grid" style="background: var(--input-bg); padding: 15px; border-radius: 8px;">
        <div class="form-group" style="margin-bottom: 0;"><span style="color: var(--text-light); font-size: 12px;">學號</span><span id="modal-student-no">-</span></div>
        <div class="form-group" style="margin-bottom: 0;"><span style="color: var(--text-light); font-size: 12px;">身分證字號</span><span id="modal-id-no">-</span></div>
        <div class="form-group" style="margin-bottom: 0;"><span style="color: var(--text-light); font-size: 12px;">生日</span><span id="modal-birthday">-</span></div>
        <div class="form-group" style="margin-bottom: 0;"><span style="color: var(--text-light); font-size: 12px;">就讀學校</span><span id="modal-school">-</span></div>
        <div class="form-group" style="margin-bottom: 0;"><span style="color: var(--text-light); font-size: 12px;">年級</span><span id="modal-grade">-</span></div>
        <div class="form-group" style="margin-bottom: 0;"><span style="color: var(--text-light); font-size: 12px;">家長姓名</span><span id="modal-parent-name">-</span></div>
        <div class="form-group" style="margin-bottom: 0;"><span style="color: var(--text-light); font-size: 12px;">聯絡電話</span><span id="modal-phone">-</span></div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="form-modal">
    <div class="modal-content">
      <span class="material-symbols-outlined modal-close" onclick="window.closeFormModal()">close</span>
      <h2 id="form-title" style="margin-top: 0; color: var(--primary);">新增學生資料</h2>
      <form id="student-form">
        <input type="hidden" id="student-id">
        <div class="form-grid">
          <div class="form-group full-width">
            <label for="photo_file">上傳/更新大頭照</label>
            <input type="file" id="photo_file" accept="image/jpeg, image/png, image/webp">
            <div class="current-photo-preview" id="current-photo-container" style="display: none;"><img src="" id="current-photo-img"><span>目前照片</span></div>
          </div>
          <div class="form-group"><label for="name">學生姓名 <span style="color:red">*</span></label><input type="text" id="name" required></div>
          <div class="form-group"><label for="branch_id">所屬分校 <span style="color:red">*</span></label><select id="branch_id" required><option value="" disabled selected>載入中...</option></select></div>
          <div class="form-group"><label for="student_number">學號</label><input type="text" id="student_number"></div>
          <div class="form-group"><label for="id_number">身分證字號</label><input type="text" id="id_number"></div>
          <div class="form-group"><label for="birthday">生日</label><input type="date" id="birthday"></div>
          <div class="form-group"><label for="school">就讀學校</label><input type="text" id="school"></div>
          <div class="form-group"><label for="grade">年級</label><input type="text" id="grade"></div>
          <div class="form-group"><label for="parent_name">家長姓名</label><input type="text" id="parent_name"></div>
          <div class="form-group"><label for="parent_phone">家長聯絡電話</label><input type="text" id="parent_phone"></div>
        </div>
        <div class="actions" style="margin-top: 25px;"><button type="button" class="btn btn-cancel" onclick="window.closeFormModal()">取消</button><button type="submit" class="btn btn-primary" id="submit-btn">儲存資料</button></div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="attendance-modal">
    <div class="modal-content" style="max-width: 450px;">
      <span class="material-symbols-outlined modal-close" onclick="window.closeAttendanceModal()">close</span>
      <h2 id="att-modal-name" style="margin-top: 0; color: var(--primary);">考勤紀錄</h2>
      
      <div class="calendar-header">
        <span class="material-symbols-outlined calendar-nav" onclick="window.changeMonth(-1)">chevron_left</span>
        <span id="cal-month-year">YYYY 年 MM 月</span>
        <span class="material-symbols-outlined calendar-nav" onclick="window.changeMonth(1)">chevron_right</span>
      </div>
      
      <div class="calendar-grid">
        <div class="calendar-day-header">日</div><div class="calendar-day-header">一</div><div class="calendar-day-header">二</div>
        <div class="calendar-day-header">三</div><div class="calendar-day-header">四</div><div class="calendar-day-header">五</div><div class="calendar-day-header">六</div>
      </div>
      <div class="calendar-grid" id="cal-grid">
        </div>
      
      <div class="attendance-detail-box" id="att-detail-box">
        <div style="color:var(--text-light); text-align:center;">請點選上方日期查看</div>
      </div>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
