<!DOCTYPE html>
<html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>學生管理 - 陽禾文理補習班</title><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" /><link rel="stylesheet" href="../style.css" /><script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script></head>
<body>
  <main class="main-wrapper">
    <header class="header"><div class="header-left"><span class="material-symbols-outlined" style="font-size:28px; color:var(--primary);">group</span><h1>學生管理</h1></div></header>
    <div class="container">
      <div id="view-list" class="view-section active">
        <div class="card">
          <div class="toolbar"><h2 class="toolbar-title">學生名冊</h2><button class="btn btn-primary" onclick="window.openEditor()"><span class="material-symbols-outlined">add</span>新增學生</button></div>
          <div class="table-responsive"><table><thead><tr><th>姓名 (學號)</th><th>分校</th><th>家長姓名</th><th>電話</th><th>操作</th></tr></thead><tbody id="student-list"><tr><td colspan="5" style="text-align:center;">載入中...</td></tr></tbody></table></div>
        </div>
      </div>

      <div id="view-editor" class="view-section">
        <div class="toolbar" style="background:var(--surface); padding:20px; border-radius:12px; border:1px solid var(--border); margin-bottom:20px;">
          <button class="btn btn-cancel" onclick="window.switchView('list')"><span class="material-symbols-outlined">arrow_back</span>返回</button>
          <h2 class="toolbar-title" id="editor-title" style="margin:0;">編輯學生</h2>
        </div>
        <div class="card">
          <div class="form-tabs">
            <button class="form-tab active" id="tab-btn-basic" onclick="window.switchFormTab('basic')">基本資料</button>
            <button class="form-tab" id="tab-btn-att" onclick="window.switchFormTab('att')">考勤紀錄與請假</button>
          </div>
          
          <div id="tab-basic" class="form-tab-content active">
            <form id="student-form">
              <input type="hidden" id="student-id">
              <div class="form-grid">
                <div class="form-group"><label>學生姓名 *</label><input type="text" id="name" required></div>
                <div class="form-group"><label>學號</label><input type="text" id="student_number"></div>
                <div class="form-group"><label>分校 *</label><select id="branch_id" required></select></div>
                <div class="form-group"><label>學生電話</label><input type="text" id="phone"></div>
                <div class="form-group"><label>家長姓名</label><input type="text" id="parent_name"></div>
                <div class="form-group"><label>家長電話</label><input type="text" id="parent_phone"></div>
              </div>
              <div class="actions" style="margin-top:20px;"><button type="submit" class="btn btn-primary">儲存</button></div>
            </form>
          </div>
          
          <div id="tab-att" class="form-tab-content">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><h3>出缺席行事曆</h3><button class="btn btn-warning" style="background:#f59e0b; color:white; border:none;" onclick="window.markLeave()"><span class="material-symbols-outlined">medical_information</span> 登記請假</button></div>
            <div id="calendar" style="background:#fff; padding:10px; border:1px solid var(--border); border-radius:8px; margin-bottom:20px;"></div>
            <h3>打卡明細</h3>
            <div class="table-responsive"><table><thead><tr><th>日期</th><th>狀態</th><th>進班</th><th>離班/事由</th></tr></thead><tbody id="att-list"></tbody></table></div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <div class="modal-overlay" id="custom-dialog"><div class="modal-content" style="max-width:400px; text-align:center; padding:30px;"><div id="dialog-icon"></div><h3 id="dialog-title" style="margin-top:0;"></h3><p id="dialog-message"></p><div style="display:flex; gap:10px; justify-content:center;"><button class="btn btn-cancel" id="dialog-btn-cancel" style="display:none;">取消</button><button class="btn btn-primary" id="dialog-btn-confirm">確定</button></div></div></div>
  <script type="module" src="./app.js"></script>
</body></html>
