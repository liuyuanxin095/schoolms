<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>學生管理 - 補習班系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <style>
    :root {
      --primary: #2563eb; --primary-hover: #1d4ed8; --danger: #dc2626; --danger-hover: #b91c1c;
      --bg-color: #f3f4f6; --surface: #ffffff; --text-main: #1f2937; --text-light: #6b7280; --border: #e5e7eb;
    }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; }
    
    .header { background-color: var(--surface); padding: 15px 40px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header h1 { margin: 0; font-size: 20px; }
    .back-btn { text-decoration: none; color: var(--text-main); display: flex; align-items: center; gap: 5px; font-weight: 500; }
    
    .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
    .card { background-color: var(--surface); border-radius: 8px; border: 1px solid var(--border); padding: 24px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .toolbar-title { margin: 0; font-size: 20px; display: flex; align-items: center; gap: 8px; }
    .btn-primary { background-color: var(--primary); color: white; text-decoration: none; padding: 10px 16px; border-radius: 6px; display: inline-flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 500; transition: 0.2s; border: none; cursor: pointer; }
    .btn-primary:hover { background-color: var(--primary-hover); }
    
    table { width: 100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid var(--border); padding: 12px 16px; text-align: left; font-size: 14px; vertical-align: middle; }
    th { background-color: #f9fafb; font-weight: 600; color: var(--text-light); }
    tbody tr:hover { background-color: #f8fafc; }
    
    /* 照片頭像樣式 */
    .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background-color: #e5e7eb; display: block; }
    .student-info { display: flex; align-items: center; gap: 12px; }
    
    /* 動作按鈕 */
    .action-btns { display: flex; gap: 8px; }
    .btn-icon { background: none; border: 1px solid var(--border); padding: 6px; border-radius: 6px; cursor: pointer; color: var(--text-light); transition: 0.2s; display: flex; align-items: center; justify-content: center; text-decoration: none; }
    .btn-icon:hover { background-color: #f3f4f6; color: var(--primary); }
    .btn-delete:hover { color: var(--danger); border-color: var(--danger); background-color: #fef2f2; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <span class="material-symbols-outlined" style="color: var(--primary);">school</span>
      <h1>補習班管理系統</h1>
    </div>
    <a href="../index.html" class="back-btn"><span class="material-symbols-outlined">arrow_back</span>返回首頁</a>
  </div>

  <div class="container">
    <div class="card">
      <div class="toolbar">
        <h2 class="toolbar-title"><span class="material-symbols-outlined">group</span>學生名單</h2>
        <a href="./add.html" class="btn-primary">
          <span class="material-symbols-outlined">person_add</span>新增學生
        </a>
      </div>
      
      <table>
        <thead>
          <tr>
            <th>學生</th>
            <th>身分證字號</th>
            <th>生日</th>
            <th>就讀學校</th>
            <th>年級</th>
            <th>家長聯絡人</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="student-list">
          <tr><td colspan="7" style="text-align: center; color: var(--text-light); padding: 30px;">載入中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
