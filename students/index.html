<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>學生管理 - 補習班系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>

  <div class="header">
    <div class="header-left"><span class="material-symbols-outlined" style="color: var(--primary);">school</span><h1>補習班管理系統</h1></div>
    <a href="../index.html" class="back-btn"><span class="material-symbols-outlined">arrow_back</span>返回首頁</a>
  </div>

  <div class="container">
    <div class="card">
      <div class="toolbar">
        <h2 class="toolbar-title"><span class="material-symbols-outlined">group</span>學生名單</h2>
        <a href="./add.html" class="btn btn-primary"><span class="material-symbols-outlined">person_add</span>新增學生</a>
      </div>
      
      <div class="filter-bar">
        <span class="material-symbols-outlined" style="color: var(--text-light);">search</span>
        <input type="text" id="search-input" placeholder="搜尋姓名或學號...">
        <select id="branch-filter">
          <option value="all">所有分校</option>
        </select>
      </div>
      
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>學生</th>
              <th>學號</th>
              <th>分校</th>
              <th>就讀學校</th>
              <th>年級</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="student-list">
            <tr><td colspan="6" style="text-align: center; color: var(--text-light); padding: 30px;">載入中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="detail-modal">
    <div class="modal-content">
      <span class="material-symbols-outlined modal-close" onclick="closeModal()">close</span>
      <div class="modal-header" style="display: flex; gap: 15px; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 15px;">
        <img src="" id="modal-avatar" class="avatar" style="width: 60px; height: 60px;">
        <div>
          <h2 id="modal-name" style="margin: 0 0 5px 0;">-</h2>
          <span id="modal-branch" style="background: #e0e7ff; color: var(--primary); padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 500;">-</span>
        </div>
      </div>
      <div class="form-grid" style="font-size: 14px; background: var(--input-bg); padding: 15px; border-radius: 8px;">
        <div class="form-group" style="margin-bottom: 0;"><span style="color: var(--text-light); font-size: 12px;">學號</span><span id="modal-student-no">-</span></div>
        <div class="form-group" style="margin-bottom: 0;"><span style="color: var(--text-light); font-size: 12px;">身分證字號</span><span id="modal-id-no">-</span></div>
        <div class="form-group" style="margin-bottom: 0;"><span style="color: var(--text-light); font-size: 12px;">生日</span><span id="modal-birthday">-</span></div>
        <div class="form-group" style="margin-bottom: 0;"><span style="color: var(--text-light); font-size: 12px;">就讀學校</span><span id="modal-school">-</span></div>
        <div class="form-group" style="margin-bottom: 0;"><span style="color: var(--text-light); font-size: 12px;">年級</span><span id="modal-grade">-</span></div>
        <div class="form-group" style="margin-bottom: 0;"><span style="color: var(--text-light); font-size: 12px;">聯絡電話</span><span id="modal-phone">-</span></div>
      </div>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
