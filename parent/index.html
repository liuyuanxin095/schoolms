<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>陽禾家長專區</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
  <style>
    /* 📱 暗黑 APP 樣式 */
    :root { --primary: #3b82f6; --bg: #121212; --card: #1e1e1e; --text: #f8fafc; --dim: #a1a1aa; --border: #333; }
    body.parent-app { background: var(--bg); color: var(--text); padding-bottom: 90px; margin: 0; font-family: system-ui, sans-serif; }
    .app-header { background: var(--primary); color: white; padding: 30px 20px 40px 20px; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; margin-bottom: 20px; }
    .p-card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
    .p-view { display: none; animation: slideUp 0.3s ease; }
    .p-view.active { display: block; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(30,30,30,0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--border); display: flex; padding: 12px 0 env(safe-area-inset-bottom) 0; z-index: 1000; }
    .nav-item { flex: 1; text-align: center; color: var(--dim); cursor: pointer; }
    .nav-item.active { color: var(--primary); }
    .nav-item span { display: block; font-size: 11px; margin-top: 4px; }
    .att-row { display: flex; justify-content: space-between; margin-bottom: 12px; }
    .noti-item { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 10px; display: flex; gap: 12px; align-items: center; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; } }
  </style>
</head>
<body class="parent-app">

  <div id="view-login" class="p-view active" style="height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 40px;">
    <div style="text-align: center; margin-bottom: 50px;">
      <span class="material-symbols-outlined" style="font-size: 80px; color: var(--primary);">school</span>
      <h1 style="margin: 15px 0 5px 0;">陽禾家長專區</h1>
      <p style="color: #666;">輸入家長手機號碼即可登入</p>
    </div>
    <input type="tel" id="parent-phone" placeholder="請輸入手機號碼" style="width:100%; padding:18px; border-radius:15px; background:#1a1a1a; color:white; border:2px solid #333; font-size:18px; outline:none; text-align:center;">
    <button class="btn btn-primary" onclick="window.parentLogin()" style="width:100%; margin-top:20px; padding:18px; border-radius:15px; font-size:16px; font-weight:bold;">進入系統</button>
  </div>

  <div id="view-select" class="p-view" style="padding: 20px;">
    <h2 style="margin: 20px 0;">請選擇要查看的孩子</h2>
    <div id="child-list"></div>
  </div>

  <div id="main-app" style="display: none;">
    <div id="view-home" class="p-view active">
      <header class="app-header">
        <h1 id="h-name">同學</h1>
        <p id="h-branch">陽禾文理補習班</p>
      </header>
      <div style="padding: 0 20px;">
        <div class="p-card">
          <div style="font-weight:bold; margin-bottom:15px; display:flex; align-items:center; gap:8px;"><span class="material-symbols-outlined" style="color:#10b981;">history</span> 今日出勤</div>
          <div style="display:flex; justify-content:space-between; text-align:center;">
            <div style="flex:1;"><div style="font-size:12px; color:#888;">到班</div><div id="h-in" style="font-size:18px; font-weight:bold;">--:--</div></div>
            <div style="flex:1; border-left:1px solid #333;"><div style="font-size:12px; color:#888;">離班</div><div id="h-out" style="font-size:18px; font-weight:bold;">--:--</div></div>
          </div>
        </div>
      </div>
    </div>
    <div id="view-att" class="p-view" style="padding: 20px;"><h2>出勤月曆</h2><div class="p-card" id="calendar"></div><div id="att-detail" class="p-card" style="display:none; background:#000;"><div id="att-date" style="font-weight:bold; margin-bottom:10px;"></div><div class="att-row"><span>到班</span><span id="v-in"></span></div><div class="att-row"><span>離班</span><span id="v-out"></span></div></div></div>
    <div id="view-grades" class="p-view" style="padding: 20px;"><h2>成績紀錄</h2><div id="g-list"></div></div>
    <div id="view-notis" class="p-view" style="padding: 20px;"><h2>班級通知</h2><div id="n-list"></div></div>

    <nav class="bottom-nav">
      <div class="nav-item active" onclick="window.switchTab('home')"><span class="material-symbols-outlined">home</span><span>首頁</span></div>
      <div class="nav-item" onclick="window.switchTab('att')"><span class="material-symbols-outlined">calendar_month</span><span>考勤</span></div>
      <div class="nav-item" onclick="window.switchTab('grades')"><span class="material-symbols-outlined">analytics</span><span>成績</span></div>
      <div class="nav-item" onclick="window.switchTab('notis')"><span class="material-symbols-outlined">campaign</span><span>通知</span></div>
    </nav>
  </div>

  <script type="module">
    import { supabase } from '../config.js';
    let currentId = null; let calendar = null; let attMap = {};

    window.parentLogin = async () => {
      const phone = document.getElementById('parent-phone').value.trim();
      if(!phone) return alert('請輸入電話');
      
      const { data: students, error } = await supabase.from('students').select('*, branches(name)').eq('parent_phone', phone);
      if(error || !students || students.length === 0) return alert('查無此號碼綁定的孩子資料');

      if(students.length === 1) { goDashboard(students[0]); }
      else {
        document.getElementById('view-login').classList.remove('active');
        document.getElementById('view-select').classList.add('active');
        const list = document.getElementById('child-list');
        list.innerHTML = students.map(s => `
          <div class="noti-item" onclick='window.chooseChild(${JSON.stringify(s).replace(/'/g, "&apos;")})'>
            <div style="font-weight:bold; font-size:18px; flex:1;">${s.name}</div>
            <span class="material-symbols-outlined">chevron_right</span>
          </div>
        `).join('');
      }
    };

    window.chooseChild = (s) => goDashboard(s);

    function goDashboard(s) {
      currentId = s.id;
      document.getElementById('h-name').textContent = `${s.name} 同學`;
      document.getElementById('h-branch').textContent = s.branches?.name || '陽禾補習班';
      document.getElementById('view-login').style.display = 'none';
      document.getElementById('view-select').style.display = 'none';
      document.getElementById('main-app').style.display = 'block';
      window.switchTab('home');
    }

    window.switchTab = (tab) => {
      document.querySelectorAll('.p-view').forEach(v => v.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      document.getElementById(`view-${tab}`).classList.add('active');
      const idx = ['home', 'att', 'grades', 'notis'].indexOf(tab);
      document.querySelectorAll('.nav-item')[idx].classList.add('active');
      if(tab === 'home') loadHome(); if(tab === 'att') initCal(); if(tab === 'grades') loadG(); if(tab === 'notis') loadN();
    };

    async function loadHome() {
      const today = new Date().toISOString().split('T')[0];
      const { data } = await supabase.from('attendance').select('*').match({student_id: currentId, record_date: today}).maybeSingle();
      if(data) {
        document.getElementById('h-in').textContent = data.check_in ? new Date(data.check_in).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '--:--';
        document.getElementById('h-out').textContent = data.check_out ? new Date(data.check_out).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '--:--';
      }
    }

    async function initCal() {
      const { data } = await supabase.from('attendance').select('*').eq('student_id', currentId);
      const events = []; attMap = {};
      data?.forEach(a => { attMap[a.record_date] = a; events.push({start:a.record_date, display:'background', color:a.status==='請假'?'#f59e0b':'#3b82f6'}); });
      if(!calendar) {
        calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
          initialView:'dayGridMonth', locale:'zh-tw', height:'auto', events: events,
          dateClick: (info) => {
            const a = attMap[info.dateStr];
            document.getElementById('att-date').textContent = info.dateStr;
            document.getElementById('v-in').textContent = a?.check_in ? new Date(a.check_in).toLocaleTimeString() : '--:--';
            document.getElementById('v-out').textContent = a?.check_out ? new Date(a.check_out).toLocaleTimeString() : '--:--';
            document.getElementById('att-detail').style.display = 'block';
          }
        });
        calendar.render();
      } else { calendar.removeAllEvents(); calendar.addEventSource(events); }
    }

    async function loadG() {
      const { data } = await supabase.from('grades').select('*, class_exams(*)').eq('student_id', currentId).order('created_at', {ascending:false});
      document.getElementById('g-list').innerHTML = data?.map(g => `<div class="p-card"><div style="display:flex; justify-content:space-between;"><strong>${g.class_exams.exam_name}</strong><span style="color:var(--primary); font-size:20px; font-weight:bold;">${g.score??'缺'}</span></div><div style="font-size:12px; color:#888;">${g.class_exams.subject} · ${g.class_exams.exam_date}</div></div>`).join('');
    }

    async function loadN() {
      const { data } = await supabase.from('notifications').select('*').order('created_at', {ascending:false});
      document.getElementById('n-list').innerHTML = data?.map(n => `<div class="noti-item"><div style="flex:1;"><div style="font-size:11px; color:#666;">${new Date(n.created_at).toLocaleDateString()}</div><div style="font-weight:bold;">${n.title}</div><div style="font-size:13px; color:#888;">${n.content}</div></div></div>`).join('');
    }
  </script>
</body>
</html>
