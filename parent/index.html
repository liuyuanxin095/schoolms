<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>陽禾家長專區</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
  
  <style>
    /* =========================================
       📱 主題與全域變數
    ========================================= */
    :root {
      --primary: #3b82f6; --success: #10b981; --warning: #f59e0b; --dot-color: #d97706;
      /* 預設深色模式 (仿截圖質感) */
      --bg-color: #000000; --card-bg: #1c1c1e; --text-main: #ffffff; --text-muted: #8e8e93;
      --border-solid: #2c2c2e; --nav-bg: rgba(30, 30, 30, 0.95);
      --header-bg: #1c1c1e; --header-text: #ffffff; --detail-card-bg: #2c2c2e;
    }

    [data-theme="light"] {
      --bg-color: #f1f5f9; --card-bg: #ffffff; --text-main: #0f172a; --text-muted: #64748b;
      --border-solid: #e2e8f0; --nav-bg: rgba(255, 255, 255, 0.95);
      --header-bg: linear-gradient(135deg, #3b82f6, #2563eb); --header-text: #ffffff; --detail-card-bg: #f8fafc;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background-color: var(--bg-color); color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0; min-height: 100vh; overflow-x: hidden; transition: 0.3s;
    }

    .view-section { display: none; opacity: 0; min-height: 100vh; }
    .view-section.active { display: block; opacity: 1; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { transform: translateY(10px); } to { transform: translateY(0); } }

    /* 通用 UI */
    .app-header { background: var(--header-bg); color: var(--header-text); padding: 40px 20px 25px 20px; border-radius: 0 0 24px 24px; margin-bottom: 20px; }
    .card { background-color: var(--card-bg); border-radius: 16px; padding: 20px; margin: 0 15px 15px 15px; border: 1px solid var(--border-solid); }
    .card-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; color: var(--text-main); }
    
    .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .btn-primary { background: var(--primary); color: white; }

    /* 底部導覽列 */
    .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--nav-bg); backdrop-filter: blur(10px); border-top: 1px solid var(--border-solid); display: flex; justify-content: space-around; padding: 10px 0 calc(10px + env(safe-area-inset-bottom)) 0; z-index: 1000; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted); cursor: pointer; font-size: 11px; }
    .nav-item.active { color: var(--primary); }
    .has-bottom-nav { padding-bottom: 100px; }

    .list-item { display: flex; align-items: flex-start; gap: 12px; padding: 16px; background: var(--card-bg); border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border-solid); cursor: pointer; }
    .empty-state { text-align: center; color: var(--text-muted); padding: 30px 15px; font-size: 14px; }

    /* =========================================
       🗓️ 行事曆究極美化 (完全仿製截圖)
    ========================================= */
    .fc { font-family: inherit; font-size: 14px; }
    /* 拔掉所有醜陋的邊框 */
    .fc .fc-scrollgrid, .fc td, .fc th, .fc-theme-standard .fc-scrollgrid { border: none !important; }
    
    /* 頂部月份標題與切換按鈕 */
    .fc .fc-toolbar { margin-bottom: 20px !important; }
    .fc .fc-toolbar-title { font-size: 18px !important; font-weight: bold; color: var(--text-main); letter-spacing: 1px; }
    .fc .fc-button { background: transparent !important; border: none !important; color: var(--text-muted) !important; box-shadow: none !important; padding: 0 !important; }
    .fc .fc-button:hover { color: var(--text-main) !important; }
    
    /* 星期標題 (日 一 二...) */
    .fc .fc-col-header-cell-cushion { color: var(--text-muted); font-weight: normal; font-size: 13px; padding-bottom: 15px; text-transform: uppercase; }
    
    /* 日期數字的容器 */
    .fc-daygrid-day-frame { 
      display: flex !important; flex-direction: column; align-items: center; justify-content: flex-start; 
      padding: 6px 0 !important; min-height: 48px !important; border-radius: 10px; border: 1px solid transparent; transition: 0.2s; cursor: pointer;
    }
    
    /* 日期數字本身 */
    .fc-daygrid-day-number { color: var(--text-main); font-size: 16px; width: 100%; text-align: center; padding: 0 !important; text-decoration: none !important; }
    
    /* 移除今天的預設背景，改為單純文字加亮 */
    .fc-day-today .fc-daygrid-day-frame { background-color: transparent !important; }
    .fc-day-today .fc-daygrid-day-number { font-weight: bold; color: var(--primary); }

    /* 💡 點擊選中時的綠色外框 (仿截圖的框線) */
    .selected-date { border: 1px solid #4ade80 !important; background-color: rgba(74, 222, 128, 0.05); }

    /* 考勤橘色小圓點 */
    .event-dot { width: 4px; height: 4px; background-color: var(--dot-color); border-radius: 50%; margin: 4px auto 0 auto; }

    /* =========================================
       📄 當日詳情卡片
    ========================================= */
    .detail-card { background: var(--detail-card-bg); border-radius: 16px; padding: 20px; margin-top: 10px; }
    .detail-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 15px; align-items: center; }
    .detail-label { color: var(--text-muted); }
    .detail-value { font-weight: bold; color: var(--text-main); }

    /* Modal 彈窗 */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 2000; }
    .modal-content { background: var(--card-bg); width: 90%; max-width: 400px; border-radius: 20px; padding: 24px; position: relative; border: 1px solid var(--border-solid); max-height: 80vh; overflow-y: auto; }
  </style>
</head>
<body>

  <div id="view-loading" class="view-section active" style="display: flex; align-items: center; justify-content: center;">
    <div style="text-align: center; color: var(--primary);">
      <span class="material-symbols-outlined" style="font-size: 48px; animation: spin 2s linear infinite;">sync</span>
    </div>
  </div>

  <div id="view-login" class="view-section" style="display: flex; flex-direction: column; justify-content: center; padding: 30px;">
    <div style="text-align: center; margin-bottom: 40px;">
      <span class="material-symbols-outlined" style="font-size: 72px; color: var(--primary);">school</span>
      <h1 style="margin: 16px 0 8px 0; font-size: 28px;">陽禾家長專區</h1>
      <p style="color: var(--text-muted); margin: 0;">輸入手機號碼，隨時掌握學習狀況</p>
    </div>
    <div class="card">
      <div style="margin-bottom: 20px;">
        <label style="display:block; color:var(--text-muted); font-size:13px; margin-bottom:8px;">家長手機號碼</label>
        <input type="tel" id="input-phone" placeholder="例：0912345678" style="width:100%; padding:14px; border-radius:10px; background:var(--bg-color); border:1px solid var(--border-solid); color:var(--text-main); font-size:16px; outline:none; text-align:center;">
      </div>
      <button id="btn-login" class="btn btn-primary">進入系統</button>
    </div>
  </div>

  <div id="view-select" class="view-section" style="padding: 20px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin: 20px 0 24px 0;">
      <h2 style="margin: 0;"><span class="material-symbols-outlined" style="vertical-align:bottom; color:var(--primary);">group</span> 請選擇孩子</h2>
      <button onclick="window.parentLogout()" style="background:transparent; border:none; color:var(--text-muted); font-size:14px; cursor:pointer;">登出</button>
    </div>
    <div id="child-list-container"></div>
  </div>

  <div id="view-main" class="view-section has-bottom-nav">
    <nav class="bottom-nav">
      <div class="nav-item active" data-tab="home"><span class="material-symbols-outlined">home</span>首頁</div>
      <div class="nav-item" data-tab="att"><span class="material-symbols-outlined">calendar_month</span>考勤</div>
      <div class="nav-item" data-tab="grades"><span class="material-symbols-outlined">analytics</span>成績</div>
      <div class="nav-item" data-tab="notis"><span class="material-symbols-outlined">campaign</span>通知</div>
    </nav>

    <div id="tab-home" class="tab-content active">
      <header class="app-header">
        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
          <div>
            <h1 id="header-name" style="margin: 0 0 4px 0; font-size: 22px;">同學</h1>
            <p id="header-branch" style="margin: 0; font-size: 14px; opacity: 0.9;">陽禾文理補習班</p>
          </div>
          <div style="display: flex; gap: 10px; align-items: center;">
            <button id="btn-theme-toggle" style="background:transparent; border:none; color:var(--header-text); display:flex; align-items:center; cursor:pointer;"><span class="material-symbols-outlined" id="theme-icon">light_mode</span></button>
            <button id="btn-switch-child" style="display:none; background:rgba(255,255,255,0.2); border:none; color:white; padding:6px 12px; border-radius:20px; font-size:12px; cursor:pointer;"><span class="material-symbols-outlined" style="font-size:14px; vertical-align:middle;">swap_horiz</span> 切換</button>
          </div>
        </div>
      </header>

      <div class="card">
        <div class="card-title"><span class="material-symbols-outlined" style="color:var(--success);">history</span> 今日出勤</div>
        <div style="display:flex; justify-content:space-around; text-align:center;">
          <div><div style="font-size:12px; color:var(--text-muted);">到班時間</div><div id="home-in" style="font-size:20px; font-weight:bold; margin-top:4px;">--:--</div></div>
          <div style="width:1px; background:var(--border-solid);"></div>
          <div><div style="font-size:12px; color:var(--text-muted);">離班時間</div><div id="home-out" style="font-size:20px; font-weight:bold; margin-top:4px;">--:--</div></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title"><span class="material-symbols-outlined" style="color:var(--warning);">campaign</span> 最新公告</div>
        <div id="home-latest-noti"><div class="empty-state">載入中...</div></div>
      </div>
    </div>

    <div id="tab-att" class="tab-content" style="display:none; padding-top:20px;">
      <div style="padding: 0 15px 15px 15px; color:var(--text-main);">
        <h2 style="margin:0; font-size:24px; font-weight:800;">出勤紀錄</h2>
      </div>
      
      <div class="card" style="padding: 15px 10px; margin-bottom: 10px;">
        <div style="font-size:14px; color:var(--text-muted); margin-bottom:5px; margin-left:5px; display:flex; align-items:center; gap:5px;"><span class="material-symbols-outlined" style="font-size:16px;">calendar_month</span> 月曆檢視</div>
        <div id="calendar"></div>
      </div>

      <div style="padding: 0 15px;">
        <div style="font-size:14px; color:var(--text-muted); margin-bottom:5px; margin-top:15px; display:flex; align-items:center; gap:5px;"><span class="material-symbols-outlined" style="font-size:16px;">description</span> 當日詳情</div>
        <div class="detail-card" id="att-detail-card">
          <div id="att-detail-date" style="font-size:18px; font-weight:bold; margin-bottom:20px; color:var(--text-main);">--月--日</div>
          <div class="detail-row"><span class="detail-label">到班</span><span id="att-detail-in" class="detail-value">--:--</span></div>
          <div class="detail-row"><span class="detail-label">離班</span><span id="att-detail-out" class="detail-value">尚未紀錄</span></div>
          <div class="detail-row" style="margin-bottom:0;"><span class="detail-label">狀態</span><span id="att-detail-status" class="detail-value">無紀錄</span></div>
        </div>
      </div>
    </div>

    <div id="tab-grades" class="tab-content" style="display:none; padding-top:20px;">
      <h2 style="margin: 0 15px 15px 15px; font-size:24px; font-weight:800;">成績紀錄</h2>
      <div id="grades-container"></div>
    </div>

    <div id="tab-notis" class="tab-content" style="display:none; padding-top:20px;">
      <h2 style="margin: 0 15px 15px 15px; font-size:24px; font-weight:800;">班級公告</h2>
      <div id="notis-container"></div>
    </div>
  </div>

  <div class="modal-overlay" id="noti-modal">
    <div class="modal-content">
      <span class="material-symbols-outlined" id="close-modal" style="position:absolute; right:20px; top:20px; cursor:pointer; color:var(--text-muted);">close</span>
      <h3 id="modal-title" style="margin:0 0 8px 0; color:var(--primary); padding-right:24px;"></h3>
      <div id="modal-time" style="font-size:12px; color:var(--text-muted); margin-bottom:16px;"></div>
      <div id="modal-body" style="font-size:15px; line-height:1.6; white-space:pre-wrap;"></div>
    </div>
  </div>

  <style> @keyframes spin { 100% { transform: rotate(360deg); } } </style>

  <script type="module">
    import { supabase } from '../config.js';

    let allMyKids = [];
    let currentStudent = null;
    let calendarInstance = null;
    let attendanceDataMap = {};

    // ==============================================
    // 💡 日夜模式切換邏輯
    // ==============================================
    function initTheme() {
      const savedTheme = localStorage.getItem('yh_parent_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
      updateThemeIcon(savedTheme);

      document.getElementById('btn-theme-toggle').addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('yh_parent_theme', next);
        updateThemeIcon(next);
      });
    }

    function updateThemeIcon(theme) {
      document.getElementById('theme-icon').textContent = theme === 'dark' ? 'light_mode' : 'dark_mode';
    }

    // ==============================================
    // 初始化與記憶登入
    // ==============================================
    document.addEventListener('DOMContentLoaded', async () => {
      initTheme();
      const savedPhone = localStorage.getItem('yh_parent_phone');
      if (savedPhone) await executeLogin(savedPhone, true);
      else switchView('view-login');

      document.getElementById('btn-login').addEventListener('click', () => {
        const phone = document.getElementById('input-phone').value.trim();
        if(!phone) return alert('請輸入家長手機號碼！');
        executeLogin(phone, false);
      });

      document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', (e) => switchTab(e.currentTarget.dataset.tab));
      });

      document.getElementById('close-modal').addEventListener('click', () => { document.getElementById('noti-modal').style.display = 'none'; });
      document.getElementById('btn-switch-child').addEventListener('click', () => renderChildSelection(allMyKids));
    });

    window.parentLogout = () => {
      if(confirm('確定要登出家長專區嗎？')) {
        localStorage.removeItem('yh_parent_phone');
        localStorage.removeItem('yh_kid_id');
        window.location.reload();
      }
    };

    async function executeLogin(phone, isAutoLogin = false) {
      const btn = document.getElementById('btn-login');
      if(!isAutoLogin) { btn.textContent = '連線中...'; btn.disabled = true; }
      switchView('view-loading');

      try {
        const { data: students, error } = await supabase.from('students').select('*, branches(name)').eq('parent_phone', phone);
        if (error) throw error;
        if (!students || students.length === 0) {
          localStorage.removeItem('yh_parent_phone');
          throw new Error('查無此號碼綁定的孩子資料，請聯絡補習班。');
        }

        localStorage.setItem('yh_parent_phone', phone);
        allMyKids = students;

        if (students.length === 1) {
          loadDashboard(students[0]);
        } else {
          const savedKidId = localStorage.getItem('yh_kid_id');
          const targetKid = students.find(s => s.id === savedKidId);
          if (targetKid && isAutoLogin) loadDashboard(targetKid);
          else renderChildSelection(students);
        }
      } catch (err) {
        alert(err.message);
        switchView('view-login');
      } finally {
        if(!isAutoLogin) { btn.textContent = '進入系統'; btn.disabled = false; }
      }
    }

    function switchView(viewId) {
      document.querySelectorAll('.view-section').forEach(v => { v.classList.remove('active'); v.style.display = 'none'; });
      const target = document.getElementById(viewId);
      target.style.display = 'block';
      setTimeout(() => target.classList.add('active'), 10);
    }

    function renderChildSelection(students) {
      const container = document.getElementById('child-list-container');
      container.innerHTML = '';
      students.forEach(student => {
        const div = document.createElement('div'); div.className = 'list-item';
        div.innerHTML = `<div style="background:#2563eb30; padding:10px; border-radius:50%;"><span class="material-symbols-outlined" style="color:var(--primary);">face</span></div><div style="flex:1;"><div style="font-weight:bold; font-size:18px; color:var(--text-main);">${student.name}</div><div style="font-size:12px; color:var(--text-muted);">學號：${student.student_number || '無'}</div></div><span class="material-symbols-outlined" style="color:var(--text-muted);">chevron_right</span>`;
        div.addEventListener('click', () => {
          localStorage.setItem('yh_kid_id', student.id);
          loadDashboard(student);
        });
        container.appendChild(div);
      });
      switchView('view-select');
    }

    function loadDashboard(student) {
      currentStudent = student;
      document.getElementById('header-name').textContent = `${student.name} 同學`;
      document.getElementById('header-branch').textContent = student.branches?.name || '陽禾文理補習班';
      document.getElementById('btn-switch-child').style.display = allMyKids.length > 1 ? 'inline-block' : 'none';

      switchView('view-main');
      switchTab('home'); 
    }

    function switchTab(tabId) {
      document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
      document.querySelector(`.nav-item[data-tab="${tabId}"]`).classList.add('active');
      document.querySelectorAll('.tab-content').forEach(tab => tab.style.display = 'none');
      document.getElementById(`tab-${tabId}`).style.display = 'block';

      if (tabId === 'home') { fetchHomeData(); fetchHomeNotis(); }
      if (tabId === 'att') initCalendar();
      if (tabId === 'grades') fetchGrades();
      if (tabId === 'notis') fetchNotifications();
    }

    // ==============================================
    // 資料抓取與渲染 (增強防呆與錯誤捕捉)
    // ==============================================
    
    // 💡 1. 抓取首頁考勤
    async function fetchHomeData() {
      try {
        const today = new Date().toISOString().split('T')[0];
        const { data, error } = await supabase.from('attendance').select('*').eq('student_id', currentStudent.id).eq('record_date', today).maybeSingle();
        if (error) throw error;

        const inEl = document.getElementById('home-in'); const outEl = document.getElementById('home-out');
        if (data) {
          inEl.textContent = data.check_in ? new Date(data.check_in).toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'}) : '--:--';
          outEl.textContent = data.check_out ? new Date(data.check_out).toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'}) : '--:--';
          if(data.status === '請假') { inEl.textContent = '請假'; outEl.textContent = '請假'; inEl.style.color = 'var(--warning)'; } else { inEl.style.color = ''; }
        } else { 
          inEl.textContent = '--:--'; outEl.textContent = '--:--'; inEl.style.color = ''; 
        }
      } catch (err) {
        console.error('抓取首頁考勤失敗:', err);
      }
    }

    // 💡 2. 抓取首頁最新公告
    async function fetchHomeNotis() {
      const container = document.getElementById('home-latest-noti');
      try {
        const { data, error } = await supabase.from('notifications').select('*').order('created_at', {ascending:false}).limit(2);
        if (error) throw error;
        if (!data || data.length === 0) { container.innerHTML = '<div class="empty-state">目前尚無最新公告</div>'; return; }
        
        container.innerHTML = data.map(n => `<div style="margin-bottom:10px; padding-bottom:10px; border-bottom:1px solid var(--border-solid);"><div style="font-size:12px; color:var(--text-muted);">${new Date(n.created_at).toLocaleDateString()}</div><div style="font-weight:bold; color:var(--text-main); font-size:15px; margin:4px 0;">${n.title}</div><div style="font-size:13px; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${n.content}</div></div>`).join('');
      } catch (err) {
        console.error('抓取首頁公告失敗:', err);
        container.innerHTML = '<div class="empty-state">無法載入公告</div>';
      }
    }

    // 💡 3. 初始化行事曆 (完全符合截圖邏輯)
    async function initCalendar() {
      try {
        const { data, error } = await supabase.from('attendance').select('*').eq('student_id', currentStudent.id);
        if(error) throw error;

        attendanceDataMap = {};
        if (data) data.forEach(r => attendanceDataMap[r.record_date] = r);

        if (!calendarInstance) {
          calendarInstance = new FullCalendar.Calendar(document.getElementById('calendar'), {
            initialView: 'dayGridMonth', locale: 'zh-tw', height: 'auto', fixedWeekCount: false,
            headerToolbar: { left: 'prev', center: 'title', right: 'next' },
            dayHeaderFormat: { weekday: 'short' }, // 只顯示 週一、週二... (透過 CSS 隱藏"週"字可自訂)
            // 自訂日期數字，只輸出純數字
            dayCellContent: (arg) => { return arg.date.getDate(); },
            // 加入橘色小圓點
            dayCellDidMount: (info) => {
              const dateStr = info.date.toISOString().split('T')[0];
              if (attendanceDataMap[dateStr]) {
                const dot = document.createElement('div');
                dot.className = 'event-dot';
                info.el.querySelector('.fc-daygrid-day-frame').appendChild(dot);
              }
            },
            // 點擊日期時加上綠色外框 (仿截圖 selected 狀態)
            dateClick: (info) => {
              document.querySelectorAll('.fc-daygrid-day-frame').forEach(el => el.classList.remove('selected-date'));
              info.dayEl.querySelector('.fc-daygrid-day-frame').classList.add('selected-date');
              renderAttendanceDetail(info.dateStr);
            }
          });
          calendarInstance.render();
        } else {
          calendarInstance.render(); 
        }
        
        // 預設選中並顯示今天
        const todayStr = new Date().toISOString().split('T')[0];
        setTimeout(() => {
          const todayEl = document.querySelector(`.fc-day[data-date="${todayStr}"] .fc-daygrid-day-frame`);
          if(todayEl) todayEl.classList.add('selected-date');
        }, 100);
        renderAttendanceDetail(todayStr);

      } catch (err) {
        console.error('載入行事曆失敗:', err);
      }
    }

    function renderAttendanceDetail(dateStr) {
      const record = attendanceDataMap[dateStr];
      const d = new Date(dateStr); const days = ['日','一','二','三','四','五','六'];
      document.getElementById('att-detail-date').textContent = `${d.getMonth()+1}月${d.getDate()}日 (${days[d.getDay()]})`;
      
      if (record) {
        document.getElementById('att-detail-in').textContent = record.check_in ? new Date(record.check_in).toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'}) : '尚未紀錄';
        document.getElementById('att-detail-out').textContent = record.check_out ? new Date(record.check_out).toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'}) : '尚未紀錄';
        const statusEl = document.getElementById('att-detail-status'); statusEl.textContent = record.status; statusEl.style.color = record.status === '請假' ? 'var(--warning)' : 'var(--text-main)';
      } else {
        document.getElementById('att-detail-in').textContent = '--:--'; document.getElementById('att-detail-out').textContent = '--:--'; document.getElementById('att-detail-status').textContent = '無紀錄'; document.getElementById('att-detail-status').style.color = 'var(--text-muted)';
      }
    }

    // 💡 4. 抓取成績 (強化 JOIN 失敗的防呆)
    async function fetchGrades() {
      const container = document.getElementById('grades-container');
      try {
        const { data, error } = await supabase.from('grades').select('*, class_exams(exam_name, subject, exam_date)').eq('student_id', currentStudent.id).order('created_at', {ascending: false});
        if (error) throw error;
        if (!data || data.length === 0) { container.innerHTML = '<div class="empty-state">目前尚無成績紀錄</div>'; return; }
        
        container.innerHTML = data.map(g => {
          // 確保就算 class_exams 關聯失敗也不會導致畫面當機
          const examName = g.class_exams ? g.class_exams.exam_name : '未命名測驗';
          const subject = g.class_exams ? g.class_exams.subject : '未知科目';
          const examDate = g.class_exams ? g.class_exams.exam_date : '未知日期';
          
          return `<div class="card"><div style="display:flex; justify-content:space-between; align-items:center;"><div><div style="font-weight:bold; font-size:16px;">${examName}</div><div style="font-size:12px; color:var(--text-muted); margin-top:4px;">${subject} · ${examDate}</div></div><div style="font-size:24px; font-weight:bold; color:var(--primary);">${g.score ?? '缺'}</div></div>${g.note ? `<div style="background:var(--detail-card-bg); padding:10px; border-radius:8px; margin-top:12px; font-size:13px; color:var(--text-muted);">評語：${g.note}</div>` : ''}</div>`;
        }).join('');
      } catch (err) {
        console.error('抓取成績失敗:', err);
        container.innerHTML = '<div class="empty-state">無法載入成績，請檢查資料庫關聯 (class_exams)。</div>';
      }
    }

    // 💡 5. 抓取通知
    async function fetchNotifications() {
      const container = document.getElementById('notis-container');
      try {
        const { data, error } = await supabase.from('notifications').select('*').order('created_at', {ascending: false});
        if (error) throw error;
        if (!data || data.length === 0) { container.innerHTML = '<div class="empty-state">目前尚無班級公告</div>'; return; }
        
        const studentBranch = currentStudent.branches?.name || '全校';
        
        container.innerHTML = data.map(n => `
          <div class="list-item" onclick='window.openNoti(${JSON.stringify(n).replace(/'/g, "&apos;")})'>
            <div style="background:#2563eb30; padding:12px; border-radius:12px; color:var(--primary);"><span class="material-symbols-outlined">campaign</span></div>
            <div style="flex:1; overflow:hidden;">
              <div style="font-size:12px; color:var(--primary); font-weight:bold; margin-bottom:4px;">給：${currentStudent.name} / ${studentBranch}</div>
              <div style="font-weight:bold; font-size:15px; margin-bottom:4px; color:var(--text-main); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${n.title}</div>
              <div style="font-size:13px; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${n.content}</div>
            </div>
          </div>
        `).join('');
      } catch (err) {
        console.error('抓取通知失敗:', err);
        container.innerHTML = '<div class="empty-state">無法載入公告資料。</div>';
      }
    }

    window.openNoti = (n) => {
      document.getElementById('modal-title').textContent = n.title;
      document.getElementById('modal-time').textContent = new Date(n.created_at).toLocaleString('zh-TW');
      document.getElementById('modal-body').textContent = n.content;
      document.getElementById('noti-modal').style.display = 'flex';
    };
  </script>
</body>
</html>
