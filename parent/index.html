<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>陽禾家長專區 - 隨時掌握孩子學習狀況</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
  <style>
    /* 針對手機 APP 的額外修正 */
    .mobile-view { display: none; }
    .mobile-view.active { display: block; animation: slideIn 0.3s ease-out; }
    @keyframes slideIn { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    
    .child-card { padding: 15px; border-radius: 12px; background: #2a2a2a; border: 1px solid #3a3a3a; margin-bottom: 10px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 15px; }
    .child-card:hover { border-color: var(--primary); background: #333; }
    .child-card:active { transform: scale(0.98); }
    
    #daily-detail-section { border-top: 1px solid #333; margin-top: 25px; padding-top: 20px; }
  </style>
</head>
<body class="parent-app-body">
  
  <main style="padding: 20px;">
    
    <div id="view-login" class="mobile-view active" style="margin-top: 50px;">
      <div style="text-align: center; margin-bottom: 40px;">
        <span class="material-symbols-outlined" style="font-size: 64px; color: var(--primary);">school</span>
        <h1 style="margin: 10px 0 5px 0;">陽禾家長專區</h1>
        <p style="color: #999; margin: 0;">隨時掌握孩子的學習狀況</p>
      </div>
      
      <div class="card parent-card">
        <div class="form-group">
          <label style="color:#aaa;">家長手機號碼</label>
          <input type="tel" id="parent-phone" placeholder="例：0912345678" style="background:#2d2d2d; color:white; border-color:#444;">
        </div>
        <div class="form-group">
          <label style="color:#aaa;">預設登入密碼 (為孩子身分證字號)</label>
          <input type="password" id="parent-password" placeholder="請輸入密碼" style="background:#2d2d2d; color:white; border-color:#444;">
        </div>
        <div class="actions" style="margin-top:20px;">
          <button class="btn btn-primary" id="login-btn" onclick="window.parentLogin()" style="width: 100%; font-size:16px; padding:12px;">驗證並登入</button>
        </div>
      </div>
    </div>

    <div id="view-child-select" class="mobile-view">
      <div class="toolbar" style="margin-bottom:20px; border-bottom:1px solid #333; padding-bottom:10px;">
        <h2 style="margin:0; font-size: 18px;"><span class="material-symbols-outlined" style="vertical-align:text-bottom;">group</span> 請選擇孩子</h2>
      </div>
      <div id="child-list-container">
        </div>
    </div>

    <div id="view-dashboard" class="mobile-view">
      <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #333;">
        <div>
          <h1 style="margin:0; font-size: 18px;" id="dashboard-student-name">王小明 同學</h1>
          <p style="margin:3px 0 0 0; color:#aaa; font-size:12px;" id="dashboard-student-info">112上學期 - 陽禾本部</p>
        </div>
        <div style="display:flex; gap:10px;">
          <button class="btn btn-cancel" onclick="window.location.reload()" style="background:#2a2a2a; border-color:#3a3a3a; color:#cbd5e1;"><span class="material-symbols-outlined">logout</span></button>
        </div>
      </header>

      <div class="card parent-card">
        <div style="font-size: 16px; font-weight: bold; color: var(--text-main); margin-bottom: 15px; display: flex; align-items: center; gap: 8px;">
          <span class="material-symbols-outlined" style="color:#10b981;">calendar_view_month</span> 考勤行事曆 (月曆檢視)
        </div>
        <div id="calendar"></div>
        
        <div id="daily-detail-section" style="display: none;">
          <div class="att-detail-header">
            <span class="material-symbols-outlined">description</span>
            <strong id="detail-date-str">4月1日 (三)</strong> 當日詳情
          </div>
          <div class="att-data-grid">
            <span class="att-label">到班</span><span class="att-value" id="detail-check-in">18:06</span>
            <span class="att-label">離班</span><span class="att-value" id="detail-check-out">尚未紀錄</span>
            <span class="att-label">狀態</span><span class="att-value" id="detail-status" style="color:#10b981;">到班</span>
            <span class="att-label" id="label-reason" style="display:none;">請假事由</span><span class="att-value" id="detail-reason" style="display:none; color:#f59e0b;">病假</span>
          </div>
        </div>
      </div>

      <div class="card parent-card">
        <div style="font-size: 16px; font-weight: bold; color: var(--text-main); margin-bottom: 15px; display: flex; align-items: center; gap: 8px;">
          <span class="material-symbols-outlined" style="color:#f59e0b;">emoji_events</span> 最近一次測驗成績
        </div>
        <div style="text-align: center; color:#999; padding: 15px 0;" id="latest-grade-container">
          載入中...
        </div>
      </div>
    </div>
  </main>
  
  <div class="modal-overlay" id="custom-dialog" style="z-index: 9999;"><div class="modal-content parent-card" style="max-width: 400px; text-align: center; padding: 30px;"><div id="dialog-icon" style="margin-bottom: 15px;"></div><h3 id="dialog-title" style="margin-top: 0; color: white;">提示</h3><p id="dialog-message" style="color: #bbb; margin-bottom: 25px; line-height: 1.5; font-size: 15px;"></p><div style="display: flex; gap: 10px; justify-content: center;"><button class="btn btn-primary" id="dialog-btn-confirm" style="width:100%;">確定</button></div></div></div>

  <script type="module">
    import { supabase } from '../config.js';

    let calendar = null;
    let attendanceData = {};
    let currentStudentId = null;

    // (保留原本 showCustomDialog 功能但樣式符合暗黑)
    window.showCustomDialog = (title, message, type='alert', icon='info') => { return new Promise((resolve) => { const dialog = document.getElementById('custom-dialog'); document.getElementById('dialog-title').textContent = title; document.getElementById('dialog-message').innerHTML = message.replace(/\n/g, '<br>'); document.getElementById('dialog-icon').innerHTML = `<span class="material-symbols-outlined" style="font-size: 48px; color: ${type==='error'?'#dc2626':'#3b82f6'};">${icon}</span>`; const btnConfirm = document.getElementById('dialog-btn-confirm'); const cleanup = () => { dialog.style.display = 'none'; btnConfirm.onclick = null; }; btnConfirm.onclick = () => { cleanup(); resolve(true) }; dialog.style.display = 'flex' }) }
    
    // 切換手機 APP 畫面
    window.switchAppView = (viewName) => { document.querySelectorAll('.mobile-view').forEach(v => v.classList.remove('active')); document.getElementById('view-'+viewName).classList.add('active'); if(viewName === 'dashboard' && calendar) setTimeout(()=>calendar.render(), 100); }

    // 💡 登入邏輯：改用手機號碼驗證
    window.parentLogin = async () => {
      const phone = document.getElementById('parent-phone').value.trim(); const pwd = document.getElementById('parent-password').value.trim();
      if (!phone || !pwd) return window.showCustomDialog('提示', '請填寫手機號碼與密碼！', 'alert', 'info');
      const btn = document.getElementById('login-btn'); btn.disabled = true; btn.textContent = '驗證中...';
      
      try {
        // 1. 去 supabase 查詢有沒有這個家長手機對應的孩子
        const { data: students, error } = await supabase.from('students').select('*, branches(name)').eq('parent_phone', phone);
        if (error) throw error; if (!students || students.length === 0) throw new Error('查無此手機號碼綁定的學生資料！\n請聯絡補習班核對。');
        
        // 💡 密碼驗證邏輯 (原本系統預設密碼為孩子身分證)
        const matchedStudents = students.filter(s => (s.id_number || '').toUpperCase() === pwd.toUpperCase());
        if (matchedStudents.length === 0) throw new Error('登入密碼 (孩子身分證) 錯誤！');
        
        // 2. 判斷有幾個匹配的孩子
        if (matchedStudents.length === 1) { selectStudent(matchedStudents[0]); } 
        else { renderChildSelectScreen(matchedStudents); }
      } catch (err) { window.showCustomDialog('錯誤', err.message, 'alert', 'error'); } finally { btn.disabled = false; btn.textContent = '驗證並登入'; }
    }

    // 💡 渲染「選擇孩子」畫面
    function renderChildSelectScreen(students) {
      const container = document.getElementById('child-list-container'); container.innerHTML = '';
      students.forEach(s => {
        container.innerHTML += `<div class="child-card" onclick="window.selectStudent('${s.id}')"><span class="material-symbols-outlined" style="font-size:32px; color:var(--primary);">account_circle</span><div><strong>${s.name}</strong><div style="font-size:12px; color:#aaa; margin-top:2px;">${s.branches?.name||''} · 學號: ${s.student_number||'無'}</div></div><span class="material-symbols-outlined" style="margin-left:auto; color:#444;">chevron_right</span></div>`
      })
      window.selectStudent = (id) => selectStudent(students.find(x=>x.id===id)); window.switchAppView('child-select');
    }

    // 初始化學生儀表板
    async function selectStudent(sData) {
      currentStudentId = sData.id;
      document.getElementById('dashboard-student-name').textContent = `${sData.name} 同學`;
      document.getElementById('dashboard-student-info').textContent = `${sData.semester||'本學期'} - ${sData.branches?.name||''}`;
      window.switchAppView('dashboard'); await Promise.all([initAttendanceCalendar(), loadLatestGrade()]);
    }

    // 💡 初始化「暗黑色考勤月曆」 (仿製截圖設計)
    async function initAttendanceCalendar() {
      // 1. 去抓這個學生的所有出勤紀錄
      const { data } = await supabase.from('attendance').select('*').eq('student_id', currentStudentId);
      const events = []; attendanceData = {};
      if (data) data.forEach(a => {
        // 儲存資料以便點擊顯示，對應 dots 顏色 (參考截圖，到班是橘黃色 dot)
        attendanceData[a.record_date] = a; events.push({ start: a.record_date, display: 'background', backgroundColor: a.status==='請假'?'#f59e0b':'#f59e0b', textColor: 'white', classNames: ['dot-event'] })
      });

      // 2. 初始化 FullCalendar 
      if (!calendar) {
        calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
          initialView: 'dayGridMonth', height: 'auto', headerToolbar: { left: 'prev', center: 'title', right: 'next' }, locale: 'zh-tw',
          contentHeight: 320, aspectRatio: 1.1, events: events,
          dateClick: function(info) { showAttendanceDetail(info.dateStr) },
          eventClick: function(info) { showAttendanceDetail(info.event.startStr.split('T')[0]) },
          // 客製化 dots (仿製截圖圓點)
          dayCellDidMount: function(info) { const dStr = info.date.toISOString().split('T')[0]; if(attendanceData[dStr]){ const dot = document.createElement('div'); dot.style = 'width: 4px; height: 4px; border-radius: 50%; background: #f59e0b; margin: -5px auto 0 auto; position: relative; z-index: 5;'; info.el.querySelector('.fc-daygrid-day-top').appendChild(dot); } }
        }); calendar.render();
      } else { calendar.removeAllEvents(); calendar.addEventSource(events); }
      
      // 預設顯示今天
      showAttendanceDetail(new Date().toISOString().split('T')[0]);
    }

    // 💡 顯示「當日詳情」卡片 (仿製截圖設計)
    function showAttendanceDetail(dateStr) {
      const d = new Date(dateStr); const days = ['日', '一', '二', '三', '四', '五', '六'];
      const section = document.getElementById('daily-detail-section'); const dStr = attendanceData[dateStr];
      document.getElementById('detail-date-str').textContent = `${d.getMonth()+1}月${d.getDate()}日 (${days[d.getDay()]})`; section.style.display = 'block';
      
      if (dStr) {
        document.getElementById('detail-check-in').textContent = dStr.check_in ? new Date(dStr.check_in).toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'}) : '缺席';
        document.getElementById('detail-check-out').textContent = dStr.check_out ? new Date(dStr.check_out).toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'}) : (dStr.status==='請假'?'請假':'尚未紀錄');
        document.getElementById('detail-status').textContent = dStr.status;
        document.getElementById('detail-status').style.color = dStr.status==='請假'?'#f59e0b':'#10b981'; // 參考截圖綠色到班色

        if(dStr.leave_reason) { document.getElementById('label-reason').style.display = 'inline'; document.getElementById('detail-reason').style.display = 'inline'; document.getElementById('detail-reason').textContent = dStr.leave_reason; }
        else { document.getElementById('label-reason').style.display = 'none'; document.getElementById('detail-reason').style.display = 'none'; }
      } else {
        document.getElementById('detail-check-in').textContent = '無紀錄'; document.getElementById('detail-check-out').textContent = '-'; document.getElementById('detail-status').textContent = '無紀錄'; document.getElementById('detail-status').style.color = '#777'; document.getElementById('label-reason').style.display = 'none'; document.getElementById('detail-reason').style.display = 'none';
      }
    }

    // 載入最近一次成績
    async function loadLatestGrade() {
      const container = document.getElementById('latest-grade-container');
      const { data: grades, error } = await supabase.from('grades').select('score, note, class_exams(exam_name, exam_date, subject)').eq('student_id', currentStudentId).order('created_at', { ascending: false }).limit(1);
      if (error || !grades || grades.length === 0) { container.innerHTML = '近期尚無測驗成績紀錄'; return; }
      const g = grades[0];
      container.innerHTML = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;"><div style="text-align:left;"><strong>${g.class_exams.exam_name}</strong><div style="font-size:11px; color:#aaa; margin-top:2px;">${g.class_exams.exam_date} · ${g.class_exams.subject}</div></div><div style="font-size: 32px; font-weight: bold; color:white; font-family:monospace;">${g.score??'缺'}<span style="font-size:14px; font-weight:normal;color:#999;">分</span></div></div>${g.note?`<div style="text-align:left; background:#2d2d2d; padding:10px; border-radius:8px; font-size:13px; color:#ddd; margin-top:10px;">老師評語：${g.note}</div>`:''}`
    }
  </script>
</body>
</html>
