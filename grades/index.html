<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>班級成績管理 - 補習班系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    .class-selector-area { background: #eff6ff; padding: 20px; border-radius: 8px; border: 1px solid #bfdbfe; margin-bottom: 20px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
    .class-selector-area select { flex-grow: 1; min-width: 250px; font-size: 16px; padding: 10px; }
    
    /* 統計數據看板 */
    .stats-board { display: flex; gap: 15px; background: var(--surface); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin: 15px 0; }
    .stat-card { flex: 1; text-align: center; padding: 10px; background: var(--bg-color); border-radius: 6px; }
    .stat-title { font-size: 12px; color: var(--text-light); margin-bottom: 5px; }
    .stat-value { font-size: 24px; font-weight: bold; font-family: monospace; }
    .stat-high { color: #15803d; } .stat-low { color: #b91c1c; } .stat-avg { color: #0369a1; }

    /* 批次輸入名冊表格 */
    .roster-table th { position: sticky; top: 0; background: var(--input-bg); z-index: 10; }
    .roster-table input[type="number"] { width: 80px; font-size: 16px; font-weight: bold; text-align: center; color: var(--primary); }
    .roster-table input[type="text"] { width: 100%; min-width: 150px; }
    
    .notice-box { background: #fffbeb; border-left: 4px solid #f59e0b; padding: 10px 15px; margin-top: 5px; font-size: 13px; color: #92400e; border-radius: 0 4px 4px 0; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left"><span class="material-symbols-outlined" style="color: var(--primary);">school</span><h1>補習班管理系統</h1></div>
    <a href="../index.html" class="back-btn"><span class="material-symbols-outlined">arrow_back</span>返回首頁</a>
  </div>

  <div class="container">
    <div class="class-selector-area">
      <span class="material-symbols-outlined" style="color: var(--primary); font-size: 32px;">meeting_room</span>
      <div style="flex-grow: 1;">
        <div style="font-size: 14px; color: var(--text-main); font-weight: 600; margin-bottom: 5px;">請先選擇要管理的班級：</div>
        <select id="class-select" onchange="window.handleClassChange()">
          <option value="" disabled selected>載入班級中...</option>
        </select>
      </div>
      <button class="btn btn-primary" id="btn-add-exam" disabled onclick="window.openExamModal()">
        <span class="material-symbols-outlined">add</span> 新增測驗成績
      </button>
    </div>

    <div class="card">
      <div class="toolbar">
        <h2 class="toolbar-title"><span class="material-symbols-outlined" style="color: #10b981;">history_edu</span>班級測驗紀錄</h2>
      </div>
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>考試日期</th>
              <th>測驗名稱 (科目)</th>
              <th>班級平均</th>
              <th>最高分</th>
              <th>最低分</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="exam-list">
            <tr><td colspan="6" style="text-align: center; color: var(--text-light); padding: 30px;">請先由上方選擇班級</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="exam-modal">
    <div class="modal-content" style="max-width: 800px; padding: 0;">
      <div style="padding: 20px 25px; background: var(--input-bg); border-bottom: 1px solid var(--border); border-radius: 12px 12px 0 0;">
        <span class="material-symbols-outlined modal-close" onclick="window.closeExamModal()">close</span>
        <h2 id="modal-title" style="margin: 0 0 15px 0; color: var(--primary);">登錄班級成績</h2>
        
        <form id="exam-form" class="form-grid">
          <input type="hidden" id="exam-id">
          <div class="form-group"><label>測驗名稱 <span style="color:red">*</span></label><input type="text" id="exam_name" required placeholder="例：第二週隨堂考"></div>
          <div class="form-group"><label>考試科目</label><input type="text" id="subject" placeholder="例：高中物理"></div>
          <div class="form-group"><label>考試日期 <span style="color:red">*</span></label><input type="date" id="exam_date" required></div>
          <div class="form-group full-width">
            <label>老師給班上的叮嚀 (將顯示於家長通知)</label>
            <textarea id="teacher_notice" rows="2" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-family: inherit;" placeholder="例：這次大家計算題粗心較多，請務必訂正..."></textarea>
          </div>
        </form>
      </div>

      <div style="padding: 0 25px;">
        <div class="stats-board">
          <div class="stat-card"><div class="stat-title">班級平均</div><div class="stat-value stat-avg" id="stat-avg">-</div></div>
          <div class="stat-card"><div class="stat-title">最高分</div><div class="stat-value stat-high" id="stat-high">-</div></div>
          <div class="stat-card"><div class="stat-title">最低分</div><div class="stat-value stat-low" id="stat-low">-</div></div>
        </div>
      </div>

      <div style="padding: 0 25px 25px 25px; max-height: 45vh; overflow-y: auto;">
        <div style="font-weight: 600; margin-bottom: 10px; color: var(--text-main);">學生名冊 (全班批次輸入)</div>
        <div class="table-responsive">
          <table class="roster-table" style="min-width: 500px;">
            <thead><tr><th width="30%">學生姓名</th><th width="25%">測驗分數</th><th>個人評語/備註</th></tr></thead>
            <tbody id="roster-list">
              </tbody>
          </table>
        </div>
      </div>

      <div style="padding: 15px 25px; border-top: 1px solid var(--border); text-align: right; background: #fff; border-radius: 0 0 12px 12px;">
        <button type="button" class="btn btn-cancel" onclick="window.closeExamModal()">取消</button>
        <button type="button" class="btn btn-primary" id="btn-save
