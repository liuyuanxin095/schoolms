<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>班級成績管理 - 補習班系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    /* 畫面切換控制 */
    .view-section { display: none; animation: fadeIn 0.3s ease; }
    .view-section.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* 班級卡片設計 */
    .class-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
    .class-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; gap: 10px; }
    .class-card:hover { border-color: var(--primary); box-shadow: 0 4px 12px rgba(37,99,235,0.1); transform: translateY(-2px); }
    .class-card-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .class-card-title { font-size: 18px; font-weight: bold; color: var(--text-main); margin-bottom: 5px; }
    .class-card-subtitle { font-size: 13px; color: var(--text-light); }
    
    /* 統計看板 */
    .stats-board { display: flex; gap: 15px; background: var(--surface); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin: 0 0 15px 0; }
    .stat-card { flex: 1; text-align: center; padding: 10px; background: var(--bg-color); border-radius: 6px; }
    .stat-title { font-size: 12px; color: var(--text-light); margin-bottom: 5px; }
    .stat-value { font-size: 24px; font-weight: bold; font-family: monospace; }
    .stat-high { color: #15803d; } .stat-low { color: #b91c1c; } .stat-avg { color: #0369a1; }

    /* 💡 左右雙欄排版 (桌機) */
    .editor-layout { display: grid; grid-template-columns: 350px 1fr; gap: 20px; align-items: start; }
    @media (max-width: 992px) { .editor-layout { grid-template-columns: 1fr; } } /* 平板以下變回上下排版 */

    /* 全班名冊表格與 Excel 貼上提示 */
    .roster-table th { background: var(--input-bg); position: sticky; top: 0; z-index: 10; }
    .roster-table input[type="number"] { width: 90px; font-size: 18px; font-weight: bold; text-align: center; color: var(--primary); padding: 8px; border: 2px solid var(--border); border-radius: 6px; transition: 0.2s; }
    .roster-table input[type="number"]:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(37,99,235,0.2); }
    .roster-table input[type="text"] { width: 100%; min-width: 150px; }
    .excel-hint { background: #ecfdf5; border: 1px solid #a7f3d0; color: #065f46; padding: 10px 15px; border-radius: 8px; font-size: 13px; display: flex; align-items: center; gap: 8px; margin-bottom: 15px; }
    
    .view-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid var(--border); justify-content: space-between; }
    .view-title { font-size: 24px; font-weight: bold; color: var(--text-main); margin: 0; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left"><span class="material-symbols-outlined" style="color: var(--primary);">school</span><h1>補習班管理系統</h1></div>
    <a href="../index.html" class="back-btn"><span class="material-symbols-outlined">arrow_back</span>返回首頁</a>
  </div>

  <div class="container">
    
    <div id="view-classes" class="view-section active">
      <div class="view-header">
        <div style="display: flex; align-items: center; gap: 15px;">
          <span class="material-symbols-outlined" style="font-size: 32px; color: var(--primary);">meeting_room</span>
          <h2 class="view-title">第一步：請選擇要登錄成績的班級</h2>
        </div>
        <button class="btn btn-cancel" onclick="window.openSubjectModal()">
          <span class="material-symbols-outlined">menu_book</span>管理考試科目
        </button>
      </div>
      <div class="class-grid" id="class-grid">
        <div style="text-align: center; padding: 30px; color: var(--text-light); grid-column: span 3;">載入班級中...</div>
      </div>
    </div>

    <div id="view-exams" class="view-section">
      <div class="view-header">
        <div style="display: flex; align-items: center; gap: 15px;">
          <button class="btn btn-cancel" onclick="window.switchView('classes')"><span class="material-symbols-outlined">arrow_back</span>重新選擇班級</button>
          <div>
            <h2 class="view-title" id="manage-class-title">班級名稱</h2>
            <div style="color: var(--text-light); font-size: 14px; margin-top: 5px;" id="manage-class-subtitle">分校 / 老師</div>
          </div>
        </div>
        <button class="btn btn-primary" onclick="window.openExamEditor()"><span class="material-symbols-outlined">add</span>新增測驗成績</button>
      </div>
      
      <div class="card" style="padding: 0; border: none; box-shadow: none;">
        <div class="table-responsive" style="border: 1px solid var(--border); border-radius: 8px;">
          <table>
            <thead>
              <tr><th>考試日期</th><th>測驗名稱 (科目)</th><th>班級平均</th><th>最高分</th><th>最低分</th><th>操作</th></tr>
            </thead>
            <tbody id="exam-list">
              <tr><td colspan="6" style="text-align: center; color: var(--text-light); padding: 30px;">載入中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="view-editor" class="view-section">
      <div class="view-header" style="background: var(--surface); padding: 20px; border-radius: 8px; border: 1px solid var(--border);">
        <div style="display: flex; align-items: center; gap: 15px;">
          <button class="btn btn-cancel" onclick="window.handleBackFromEditor()"><span class="material-symbols-outlined">arrow_back</span>返回列表</button>
          <h2 class="view-title" id="editor-title">新增班級測驗成績</h2>
        </div>
        <button class="btn btn-primary" id="btn-save-exam" onclick="window.saveExamData()" style="font-size: 16px; padding: 12px 24px;"><span class="material-symbols-outlined">save</span> 儲存成績與發布</button>
      </div>

      <div class="editor-layout">
        <div class="card" style="margin-bottom: 20px; position: sticky; top: 20px;">
          <h3 style="margin-top: 0; color: var(--text-main); font-size: 16px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">測驗基本設定</h3>
          <form id="exam-form" class="form-grid" style="grid-template-columns: 1fr;">
            <input type="hidden" id="exam-id">
            <div class="form-group"><label>測驗名稱 <span style="color:red">*</span></label><input type="text" id="exam_name" required placeholder="例：第二週隨堂考"></div>
            <div class="form-group"><label>考試科目 <span style="color:red">*</span></label><select id="subject" required><option value="" disabled selected>載入中...</option></select></div>
            <div class="form-group"><label>考試日期 <span style="color:red">*</span></label><input type="date" id="exam_date" required></div>
            <div class="form-group full-width">
              <label>班級通知 (將顯示於家長端)</label>
              <textarea id="teacher_notice" rows="4" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-family: inherit; resize: vertical;" placeholder="例：這次大家計算題粗心較多，請務必訂正..."></textarea>
            </div>
          </form>
        </div>

        <div class="card" style="padding-bottom: 40px;">
          <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 15px;">
            <h3 style="margin: 0; color: var(--text-main); font-size: 16px;">全班成績名冊</h3>
          </div>
          
          <div class="excel-hint">
            <span class="material-symbols-outlined">magic_button</span>
            支援 Excel 貼上！點擊第一位學生的分數框按下 <strong>Ctrl + V</strong>，系統會自動向下填滿所有成績。若為缺考請保持空白即可。
          </div>

          <div class="stats-board">
            <div class="stat-card"><div class="stat-title">班級平均</div><div class="stat-value stat-avg" id="stat-avg">-</div></div>
            <div class="stat-card"><div class="stat-title">最高分</div><div class="stat-value stat-high" id="stat-high">-</div></div>
            <div class="stat-card"><div class="stat-title">最低分</div><div class="stat-value stat-low" id="stat-low">-</div></div>
          </div>

          <div class="table-responsive" style="border: 1px solid var(--border); border-radius: 8px;">
            <table class="roster-table">
              <thead><tr><th width="35%">學生姓名 (依序號排列)</th><th width="25%">測驗分數</th><th>個人評語/備註</th></tr></thead>
              <tbody id="roster-list">
                </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

  </div>

  <div class="modal-overlay" id="subject-modal">
    <div class="modal-content" style="max-width: 400px;">
      <span class="material-symbols-outlined modal-close" onclick="window.closeSubjectModal()">close</span>
      <h2 style="margin-top: 0; color: var(--primary);">考試科目管理</h2>
      <form id="subject-form" style="display: flex; gap: 10px; margin-bottom: 20px;">
        <input type="text" id="new-subject" required placeholder="新增科目名稱..." style="flex: 1;">
        <button type="submit" class="btn btn-primary">新增</button>
      </form>
      <div id="subject-list" style="max-height: 300px; overflow-y: auto; border: 1px solid var(--border); border-radius: 6px;"></div>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
