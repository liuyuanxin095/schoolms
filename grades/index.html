<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>成績管理 - 補習班系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    /* 依據分數給予不同顏色的視覺提示 */
    .score-badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-family: monospace; font-size: 15px; }
    .score-excellent { background-color: #dcfce7; color: #15803d; } /* 綠色：80分以上 */
    .score-warning { background-color: #fee2e2; color: #b91c1c; }   /* 紅色：60分以下 */
    .score-normal { background-color: #f3f4f6; color: #4b5563; }    /* 灰色：60~79分 */
    .note-text { font-size: 12px; color: var(--text-light); max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: inline-block; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left"><span class="material-symbols-outlined" style="color: var(--primary);">school</span><h1>補習班管理系統</h1></div>
    <a href="../index.html" class="back-btn"><span class="material-symbols-outlined">arrow_back</span>返回首頁</a>
  </div>

  <div class="container">
    <div class="card">
      <div class="toolbar">
        <h2 class="toolbar-title"><span class="material-symbols-outlined" style="color: #10b981;">quiz</span>學生成績列表</h2>
        <button class="btn btn-primary" onclick="window.openFormModal()"><span class="material-symbols-outlined">add</span>登錄成績</button>
      </div>
      
      <div class="filter-bar">
        <span class="material-symbols-outlined" style="color: var(--text-light);">search</span>
        <input type="text" id="search-input" placeholder="搜尋學生姓名或考試名稱...">
        <select id="subject-filter">
          <option value="all">所有科目</option>
          </select>
      </div>
      
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>學生姓名</th>
              <th>考試名稱 (關聯班級)</th>
              <th>科目</th>
              <th>考試日期</th>
              <th>測驗分數</th>
              <th>備註</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="grade-list">
            <tr><td colspan="7" style="text-align: center; color: var(--text-light); padding: 30px;">載入中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="form-modal">
    <div class="modal-content" style="max-width: 500px;">
      <span class="material-symbols-outlined modal-close" onclick="window.closeFormModal()">close</span>
      <h2 id="form-title" style="margin-top: 0; color: var(--primary);">登錄成績</h2>
      
      <form id="grade-form">
        <input type="hidden" id="grade-id">
        <div class="form-grid">
          
          <div class="form-group full-width">
            <label for="student_id">選擇學生 <span style="color:red">*</span></label>
            <select id="student_id" required><option value="" disabled selected>載入中...</option></select>
          </div>
          
          <div class="form-group">
            <label for="exam_name">考試名稱 <span style="color:red">*</span></label>
            <input type="text" id="exam_name" required placeholder="例：第一次段考">
          </div>
          
          <div class="form-group">
            <label for="subject">考試科目 <span style="color:red">*</span></label>
            <input type="text" id="subject" required placeholder="例：國文、數學">
          </div>
          
          <div class="form-group">
            <label for="score">測驗分數 <span style="color:red">*</span></label>
            <input type="number" id="score" step="0.1" required placeholder="請輸入分數">
          </div>
          
          <div class="form-group">
            <label for="exam_date">考試日期</label>
            <input type="date" id="exam_date">
          </div>

          <div class="form-group full-width">
            <label for="class_id">關聯班級 (選填：若是補習班內測可選)</label>
            <select id="class_id"><option value="">-- 無關聯班級 (學校考試) --</option></select>
          </div>
          
          <div class="form-group full-width">
            <label for="note">備註</label>
            <input type="text" id="note" placeholder="可填寫進步狀況或學習建議...">
          </div>
          
        </div>
        
        <div class="actions" style="margin-top: 25px;">
          <button type="button" class="btn btn-cancel" onclick="window.closeFormModal()">取消</button>
          <button type="submit" class="btn btn-primary" id="submit-btn">儲存成績</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
