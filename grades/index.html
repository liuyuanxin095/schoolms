<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>成績管理 - 陽禾補習班</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <div class="main-wrapper">
    <header class="header">
      <div class="header-left">
        <button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')"><span class="material-symbols-outlined">menu</span></button>
        <h1>成績管理</h1>
      </div>
    </header>

    <div class="container">
      <div class="filter-bar">
        <button class="btn btn-primary" onclick="window.openExamModal()"><span class="material-symbols-outlined">add</span> 新增測驗項目</button>
        <div class="search-box">
          <span class="material-symbols-outlined">search</span>
          <select id="exam-select" onchange="window.loadGrades()"><option value="">-- 請先選擇測驗項目 --</option></select>
        </div>
        <button class="btn" style="background:#f1f5f9; color:var(--primary); border:1px solid var(--border);" onclick="window.editCurrentExam()">編輯此測驗設定</button>
      </div>

      <div class="card">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
          <h2 style="font-size:18px; margin:0;">學生成績登錄</h2>
          <button class="btn btn-primary" onclick="window.openGradeModal()" id="btn-add-grade" disabled><span class="material-symbols-outlined">add</span> 登錄學生成績</button>
        </div>
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>學生姓名</th>
                <th>分數</th>
                <th>班排名</th>
                <th>個人評語</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="grades-table-body">
              <tr><td colspan="5" style="text-align:center; color:var(--text-muted);">請先從上方選擇測驗項目</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="exam-modal">
    <div class="modal-content">
      <span class="material-symbols-outlined modal-close" onclick="window.closeModal('exam-modal')">close</span>
      <h2 id="exam-modal-title" style="margin-top:0;">新增測驗</h2>
      <input type="hidden" id="exam-id">
      
      <div class="form-group"><label>測驗名稱 *</label><input type="text" id="exam-name" placeholder="例：第一次段考"></div>
      <div style="display:flex; gap:15px;">
        <div class="form-group" style="flex:1;"><label>科目 *</label><input type="text" id="exam-subject" placeholder="例：數學"></div>
        <div class="form-group" style="flex:1;"><label>測驗日期 *</label><input type="date" id="exam-date"></div>
      </div>
      
      <div style="padding:15px; background:#f8fafc; border-radius:10px; border:1px solid #e2e8f0; margin-bottom:15px;">
        <div style="font-weight:bold; color:var(--primary); margin-bottom:10px; font-size:14px;">班級設定 (家長專區顯示用)</div>
        <div style="display:flex; gap:15px;">
          <div class="form-group" style="flex:1;"><label>班級名稱</label><input type="text" id="exam-class-name" placeholder="例：國二數學A班"></div>
          <div class="form-group" style="flex:1;"><label>班級平均</label><input type="number" step="0.1" id="exam-class-avg" placeholder="例：75.5"></div>
        </div>
        <div class="form-group"><label>班級整體通知 / 表現講評</label><textarea id="exam-class-notice" rows="2" placeholder="例：本次考試大家表現不錯，但計算題需多加小心..."></textarea></div>
      </div>

      <button class="btn btn-primary" style="width:100%;" onclick="window.saveExam()">儲存測驗設定</button>
    </div>
  </div>

  <div class="modal-overlay" id="grade-modal">
    <div class="modal-content">
      <span class="material-symbols-outlined modal-close" onclick="window.closeModal('grade-modal')">close</span>
      <h2 id="grade-modal-title" style="margin-top:0;">登錄成績</h2>
      <input type="hidden" id="grade-id">
      
      <div class="form-group"><label>選擇學生 *</label><select id="grade-student"></select></div>
      <div style="display:flex; gap:15px;">
        <div class="form-group" style="flex:1;"><label>分數 *</label><input type="number" id="grade-score" placeholder="例：85"></div>
        <div class="form-group" style="flex:1;"><label>班排名</label><input type="text" id="grade-rank" placeholder="例：3"></div>
      </div>
      <div class="form-group"><label>個人專屬評語 (選填)</label><textarea id="grade-note" rows="3" placeholder="針對該學生的鼓勵或建議..."></textarea></div>
      
      <button class="btn btn-primary" style="width:100%;" onclick="window.saveGrade()">儲存成績</button>
    </div>
  </div>

  <script type="module" src="../config.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
