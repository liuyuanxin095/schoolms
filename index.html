<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>補習班管理系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <style>
    /* 定義統一配色變數 */
    :root {
      --primary: #2563eb;       /* 主色調：科技藍 */
      --primary-hover: #1d4ed8; /* 懸停色 */
      --bg-color: #f3f4f6;      /* 系統背景色 */
      --surface: #ffffff;       /* 卡片/區塊底色 */
      --text-main: #1f2937;     /* 主文字顏色 */
      --border: #e5e7eb;        /* 邊框顏色 */
    }
    
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; }
    
    /* 頂部導覽列 */
    .header { background-color: var(--surface); padding: 20px 40px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
    .header h1 { margin: 0; font-size: 24px; font-weight: 600; }
    .header .material-symbols-outlined { font-size: 32px; color: var(--primary); }
    
    /* 模組選單網格 */
    .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
    .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
    
    /* 模組卡片按鈕 */
    .menu-card { background-color: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 30px 20px; text-align: center; text-decoration: none; color: var(--text-main); transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .menu-card:hover { border-color: var(--primary); box-shadow: 0 4px 6px rgba(0,0,0,0.05); transform: translateY(-2px); color: var(--primary); }
    .menu-card .material-symbols-outlined { font-size: 48px; color: var(--primary); }
  </style>
</head>
<body>
  <div class="header">
    <span class="material-symbols-outlined">school</span>
    <h1>補習班管理系統</h1>
  </div>
  
  <div class="container">
    <div class="menu-grid">
      <a href="./students/index.html" class="menu-card">
        <span class="material-symbols-outlined">group</span>
        <span style="font-weight: 600; font-size: 18px;">學生管理模組</span>
      </a>
      <a href="./branches/index.html" class="menu-card">
        <span class="material-symbols-outlined">domain</span>
        <span style="font-weight: 600; font-size: 18px;">分校管理</span>
      </a>
      <a href="./staff/index.html" class="menu-card">
        <span class="material-symbols-outlined">badge</span>
        <span style="font-weight: 600; font-size: 18px;">教職員管理</span>
      </a>
      <a href="./classrooms/index.html" class="menu-card">
        <span class="material-symbols-outlined">meeting_room</span>
        <span style="font-weight: 600; font-size: 18px;">教室空間管理</span>
      </a>
      </div>
  </div>
</body>
</html>
