<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>補習班管理系統 - 首頁</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
  <style>
    /* 首頁專屬的卡片網格樣式 (手機版自動變單行) */
    .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 30px; }
    .menu-card { background-color: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 30px 20px; text-align: center; text-decoration: none; color: var(--text-main); display: flex; flex-direction: column; align-items: center; gap: 12px; transition: 0.2s; }
    .menu-card:hover { border-color: var(--primary); box-shadow: 0 4px 6px rgba(0,0,0,0.05); transform: translateY(-2px); color: var(--primary); }
    .menu-card .material-symbols-outlined { font-size: 48px; color: var(--primary); }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <span class="material-symbols-outlined">school</span>
      <h1>補習班管理系統</h1>
    </div>
  </div>
  
  <div class="container">
    <div class="menu-grid">
      <a href="./students/index.html" class="menu-card">
        <span class="material-symbols-outlined">group</span>
        <span style="font-weight: 600; font-size: 18px;">學生管理模組</span>
      </a>
      <a href="./staff/index.html" class="menu-card">
        <span class="material-symbols-outlined">badge</span>
        <span style="font-weight: 600; font-size: 18px;">教職員管理</span>
      </a>
      <a href="./branches/index.html" class="menu-card">
        <span class="material-symbols-outlined">domain</span>
        <span style="font-weight: 600; font-size: 18px;">分校管理</span>
      </a>
      <a href="./classrooms/index.html" class="menu-card">
        <span class="material-symbols-outlined">meeting_room</span>
        <span style="font-weight: 600; font-size: 18px;">教室空間管理</span>
      </a>
      <a href="./attendance/index.html" class="menu-card">
        <span class="material-symbols-outlined">how_to_reg</span>
        <span style="font-weight: 600; font-size: 18px;">考勤打卡系統</span>
      </a>
      <a href="./classes/index.html" class="menu-card">
        <span class="material-symbols-outlined">class</span>
        <span style="font-weight: 600; font-size: 18px;">班級與課程管理</span>
      </a>
      <a href="./payments/index.html" class="menu-card">
        <span class="material-symbols-outlined" style="color: #d97706;">payments</span>
        <span style="font-weight: 600; font-size: 18px;">繳費與收據管理</span>
      </a>
      <a href="./grades/index.html" class="menu-card">
        <span class="material-symbols-outlined" style="color: #10b981;">quiz</span>
        <span style="font-weight: 600; font-size: 18px;">成績管理模組</span>
      </a>
    </div>
  </div>
</body>
</html>
