<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>補習班管理系統</title>
    <style>
      /* 簡單的版面美化 */
      body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
      h1 { color: #333; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
      button { background-color: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-size: 16px; margin-bottom: 20px;}
      button:hover { background-color: #0056b3; }
      table { width: 100%; border-collapse: collapse; }
      th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
      th { background-color: #f4f6f8; color: #333; }
    </style>
  </head>
  <body>
    <h1>補習班管理系統 - 學生名單</h1>
    <button id="load-btn">載入學生資料</button>
    
    <table>
      <thead>
        <tr>
          <th>姓名</th>
          <th>學校 / 年級</th>
          <th>家長姓名</th>
          <th>聯絡電話</th>
        </tr>
      </thead>
      <tbody id="student-list">
        <tr>
          <td colspan="4" style="text-align: center; color: #666;">點擊上方按鈕載入資料</td>
        </tr>
      </tbody>
    </table>

    <script type="module" src="/main.js"></script>
  </body>
</html>
