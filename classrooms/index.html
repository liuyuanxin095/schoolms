<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教室空間管理 - 補習班系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <div class="header">
    <div class="header-left"><span class="material-symbols-outlined" style="color: var(--primary);">school</span><h1>補習班管理系統</h1></div>
    <a href="../index.html" class="back-btn"><span class="material-symbols-outlined">arrow_back</span>返回首頁</a>
  </div>

  <div class="container">
    <div class="card">
      <div class="toolbar">
        <h2 class="toolbar-title"><span class="material-symbols-outlined">meeting_room</span>教室空間列表</h2>
        <button class="btn btn-primary" onclick="window.openFormModal()"><span class="material-symbols-outlined">add</span>新增教室</button>
      </div>
      
      <div class="filter-bar">
        <span class="material-symbols-outlined" style="color: var(--text-light);">filter_list</span>
        <select id="branch-filter">
          <option value="all">所有分校</option>
        </select>
      </div>
      
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>教室名稱</th>
              <th>所屬分校</th>
              <th>容納人數</th>
              <th>設備清單</th>
              <th>狀態</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="classroom-list">
            <tr><td colspan="6" style="text-align: center; color: var(--text-light); padding: 30px;">載入中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="form-modal">
    <div class="modal-content" style="max-width: 500px;">
      <span class="material-symbols-outlined modal-close" onclick="window.closeFormModal()">close</span>
      <h2 id="form-title" style="margin-top: 0; color: var(--primary);">新增教室</h2>
      
      <form id="classroom-form">
        <input type="hidden" id="classroom-id">
        
        <div class="form-group">
          <label for="branch_id">所屬分校 <span style="color:red">*</span></label>
          <select id="branch_id" required><option value="" disabled selected>載入中...</option></select>
        </div>
        <div class="form-group">
          <label for="name">教室名稱 <span style="color:red">*</span></label>
          <input type="text" id="name" required placeholder="例：301 大教室">
        </div>
        <div class="form-group">
          <label for="capacity">容納人數</label>
          <input type="number" id="capacity" min="0">
        </div>
        <div class="form-group">
          <label for="facilities">設備清單</label>
          <input type="text" id="facilities">
        </div>
        <div class="form-group">
          <label for="status">教室狀態</label>
          <select id="status">
            <option value="可用">可用</option>
            <option value="維修中">維修中</option>
          </select>
        </div>

        <div class="actions" style="margin-top: 20px;">
          <button type="button" class="btn btn-cancel" onclick="window.closeFormModal()">取消</button>
          <button type="submit" class="btn btn-primary" id="submit-btn">儲存資料</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
