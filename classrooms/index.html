<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教室與行事曆管理 - 補習班系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
  
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>

  <style>
    .view-section { display: none; animation: fadeIn 0.3s ease; }
    .view-section.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .module-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid var(--border); padding-bottom: 15px; }
    .tab-btn { background: transparent; border: 2px solid transparent; color: var(--text-light); font-size: 18px; font-weight: bold; padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
    .tab-btn:hover { background: var(--bg-color); color: var(--text-main); }
    .tab-btn.active { background: #eff6ff; color: var(--primary); border-color: #bfdbfe; }

    /* 狀態標籤 */
    .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; }
    .status-active { background-color: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
    .status-inactive { background-color: #f3f4f6; color: #4b5563; border: 1px solid #e5e7eb; }

    /* 💡 行事曆專屬微調 */
    #calendar-container { background: white; padding: 20px; border-radius: 8px; border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.02); margin-top: 15px; }
    .fc-event { cursor: pointer; transition: 0.2s; border: none !important; border-radius: 4px !important; }
    .fc-event:hover { filter: brightness(0.9); }
    .fc-v-event .fc-event-main { padding: 4px; }
    .fc-timegrid-slot { height: 40px !important; } /* 加大格子高度 */
    
    .fc .fc-toolbar-title { font-size: 18px !important; color: var(--text-main); }
    .fc .fc-button-primary { background-color: var(--primary) !important; border-color: var(--primary) !important; }
    .fc .fc-button-primary:hover { opacity: 0.9; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <span class="material-symbols-outlined" style="color: var(--primary);">school</span>
      <h1>補習班管理系統</h1>
    </div>
    <a href="../index.html" class="back-btn"><span class="material-symbols-outlined">arrow_back</span>返回首頁</a>
  </div>

  <div class="container">
    
    <div class="module-tabs">
      <button class="tab-btn active" onclick="window.switchTab('list')"><span class="material-symbols-outlined">meeting_room</span> 教室建檔管理</button>
      <button class="tab-btn" onclick="window.switchTab('calendar')"><span class="material-symbols-outlined">calendar_month</span> 教室排課行事曆</button>
    </div>

    <div id="view-list" class="view-section active">
      <div class="card">
        <div class="toolbar">
          <h2 class="toolbar-title"><span class="material-symbols-outlined" style="color: var(--primary);">sensor_door</span>教室列表</h2>
          <button class="btn btn-primary" onclick="window.openFormModal()"><span class="material-symbols-outlined">add</span>新增教室</button>
        </div>
        
        <div class="filter-bar">
          <span class="material-symbols-outlined" style="color: var(--text-light);">search</span>
          <input type="text" id="search-input" placeholder="搜尋教室名稱...">
          <select id="branch-filter"><option value="all">所有分校</option></select>
        </div>
        
        <div class="table-responsive">
          <table>
            <thead>
              <tr><th>教室名稱</th><th>所屬分校</th><th>容納人數</th><th>使用狀態</th><th>操作</th></tr>
            </thead>
            <tbody id="classroom-list">
              <tr><td colspan="5" style="text-align: center; color: var(--text-light); padding: 30px;">載入中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="view-calendar" class="view-section">
      <div class="card" style="background: var(--surface);">
        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 5px;">
          <span class="material-symbols-outlined" style="font-size: 32px; color: var(--primary);">calendar_view_week</span>
          <div style="flex-grow: 1;">
            <div style="font-size: 14px; font-weight: 600; color: var(--text-main); margin-bottom: 5px;">請選擇要查看的教室：</div>
            <div style="display: flex; gap: 10px;">
              <select id="cal-branch-select" onchange="window.handleCalBranchChange()" style="width: 200px; padding: 10px; font-size: 16px; border-radius: 8px;">
                <option value="" disabled selected>請先選擇分校</option>
              </select>
              <select id="cal-classroom-select" onchange="window.loadClassroomCalendar()" style="width: 250px; padding: 10px; font-size: 16px; border-radius: 8px;">
                <option value="" disabled selected>請選擇教室...</option>
              </select>
            </div>
          </div>
        </div>

        <div id="calendar-container">
          <div id="calendar"></div>
        </div>
        
        <div id="calendar-empty-state" style="text-align: center; padding: 50px; color: var(--text-light);">
          <span class="material-symbols-outlined" style="font-size: 48px; opacity: 0.5;">event_busy</span>
          <p>請從上方選擇一間教室以載入課表</p>
        </div>
      </div>
    </div>

  </div>

  <div class="modal-overlay" id="form-modal">
    <div class="modal-content" style="max-width: 400px;">
      <span class="material-symbols-outlined modal-close" onclick="window.closeFormModal()">close</span>
      <h2 id="form-title" style="margin-top: 0; color: var(--primary);">新增教室</h2>
      <form id="classroom-form">
        <input type="hidden" id="classroom-id">
        <div class="form-grid" style="grid-template-columns: 1fr;">
          <div class="form-group"><label>所屬分校 <span style="color:red">*</span></label><select id="branch_id" required><option value="" disabled selected>載入中...</option></select></div>
          <div class="form-group"><label>教室名稱 <span style="color:red">*</span></label><input type="text" id="name" required placeholder="例：101教室、A區大教室"></div>
          <div class="form-group"><label>容納人數</label><input type="number" id="capacity" min="1" placeholder="例：30"></div>
          <div class="form-group">
            <label>使用狀態</label>
            <select id="status">
              <option value="可用">開放使用</option>
              <option value="維修中">維修中/暫停使用</option>
            </select>
          </div>
        </div>
        <div class="actions" style="margin-top: 25px;">
          <button type="button" class="btn btn-cancel" onclick="window.closeFormModal()">取消</button>
          <button type="submit" class="btn btn-primary" id="submit-btn">儲存資料</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
