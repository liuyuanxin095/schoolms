<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>考勤打卡 - 陽禾文理補習班管理系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    .clock-display { font-size: 48px; font-weight: bold; font-family: monospace; color: var(--primary); text-align: center; margin: 10px 0 30px 0; letter-spacing: 2px; }
    .punch-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto; text-align: center; border: 1px solid var(--border); }
    .status-alert { padding: 15px; border-radius: 8px; margin-top: 20px; font-weight: bold; display: none; font-size: 16px; animation: fadeIn 0.3s ease; }
    .status-success { background-color: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; display: block; }
    .status-error { background-color: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; display: block; }
    .status-warning { background-color: #fef3c7; color: #b45309; border: 1px solid #fde68a; display: block; }
  </style>
  <link rel="manifest" href="/schoolms/manifest.json">
</head>
<body>

  <main class="main-wrapper">
    <header class="header">
      <div class="header-left">
        <span class="material-symbols-outlined" style="font-size: 28px; color: var(--primary);">how_to_reg</span>
        <h1>考勤打卡</h1>
      </div>
      <div class="header-right">
        <span style="font-size: 14px; color: var(--text-light); font-weight: 600;" id="header-date">載入中...</span>
      </div>
    </header>

    <div class="container" style="display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 120px);">
      <div class="punch-card">
        <span class="material-symbols-outlined" style="font-size: 48px; color: var(--text-light); opacity: 0.5;">qr_code_scanner</span>
        <h2 style="margin: 10px 0 0 0; color: var(--text-main);">學生/教職員 刷卡系統</h2>
        
        <div class="clock-display" id="clock">00:00:00</div>
        
        <form id="punch-form">
          <div style="position: relative; max-width: 300px; margin: 0 auto;">
            <span class="material-symbols-outlined" style="position: absolute; left: 15px; top: 14px; color: var(--text-light);">badge</span>
            <input type="text" id="user_number" required placeholder="請掃描條碼或輸入學號/編號" autocomplete="off" autofocus
                   style="width: 100%; padding: 15px 15px 15px 45px; font-size: 18px; border: 2px solid var(--border); border-radius: 8px; box-sizing: border-box; text-align: center; letter-spacing: 1px;">
          </div>
          <p style="font-size: 13px; color: var(--text-light); margin-top: 15px;">※ 輸入後請按 Enter 鍵確認打卡</p>
          <button type="submit" style="display: none;">隱藏的送出按鈕</button>
        </form>

        <div id="status-message" class="status-alert"></div>
        <div id="user-profile" style="display: none; margin-top: 20px; animation: fadeIn 0.3s ease;">
          <img id="user-photo" src="" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 4px solid var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
          <div id="user-name" style="font-size: 20px; font-weight: bold; margin-top: 10px; color: var(--text-main);">王小明</div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./app.js"></script>
  <script>
    document.getElementById('header-date').textContent = new Date().toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
    function updateClock() { document.getElementById('clock').textContent = new Date().toLocaleTimeString('zh-TW', { hour12: false }); }
    setInterval(updateClock, 1000); updateClock();
  </script>
</body>
</html>
