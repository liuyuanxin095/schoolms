<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分校管理 - 補習班系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>

  <div class="header">
    <div class="header-left"><span class="material-symbols-outlined" style="color: var(--primary);">school</span><h1>補習班管理系統</h1></div>
    <a href="../index.html" class="back-btn"><span class="material-symbols-outlined">arrow_back</span>返回首頁</a>
  </div>

  <div class="container">
    <div class="card">
      <div class="toolbar">
        <h2 class="toolbar-title"><span class="material-symbols-outlined">domain</span>分校據點列表</h2>
        <button class="btn btn-primary" onclick="window.openFormModal()"><span class="material-symbols-outlined">add_business</span>新增分校</button>
      </div>
      
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>分校名稱</th>
              <th>地址</th>
              <th>聯絡電話</th>
              <th>建檔日期</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="branch-list">
            <tr><td colspan="5" style="text-align: center; color: var(--text-light); padding: 30px;">載入中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="form-modal">
    <div class="modal-content" style="max-width: 500px;">
      <span class="material-symbols-outlined modal-close" onclick="window.closeFormModal()">close</span>
      <h2 id="form-title" style="margin-top: 0; color: var(--primary);">新增分校</h2>
      
      <form id="branch-form">
        <input type="hidden" id="branch-id">
        
        <div class="form-group">
          <label for="name">分校名稱 <span style="color:red">*</span></label>
          <input type="text" id="name" required placeholder="例：台北站前總校">
        </div>
        <div class="form-group">
          <label for="address">聯絡地址</label>
          <input type="text" id="address">
        </div>
        <div class="form-group">
          <label for="phone">聯絡電話</label>
          <input type="text" id="phone">
        </div>

        <div class="actions" style="margin-top: 20px;">
          <button type="button" class="btn btn-cancel" onclick="window.closeFormModal()">取消</button>
          <button type="submit" class="btn btn-primary" id="submit-btn">儲存資料</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
