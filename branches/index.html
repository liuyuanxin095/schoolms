<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分校管理 - 陽禾文理補習班管理系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <main class="main-wrapper">
    <header class="header">
      <div class="header-left">
        <span class="material-symbols-outlined" style="font-size: 28px; color: var(--primary);">domain</span>
        <h1>分校管理</h1>
      </div>
      <div class="header-right"><span style="font-size: 14px; color: var(--text-light); font-weight: 600;" id="header-date">載入中...</span></div>
    </header>

    <div class="container">
      <div class="card">
        <div class="toolbar">
          <h2 class="toolbar-title"><span class="material-symbols-outlined">domain</span>分校與據點列表</h2>
          <button class="btn btn-primary" onclick="window.openFormModal()"><span class="material-symbols-outlined">add</span>新增分校</button>
        </div>
        
        <div class="table-responsive">
          <table>
            <thead><tr><th>分校名稱</th><th>收據抬頭預設</th><th>聯絡電話</th><th>地址</th><th>操作</th></tr></thead>
            <tbody id="branch-list"><tr><td colspan="5" style="text-align: center; padding: 30px;">載入中...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <div class="modal-overlay" id="form-modal">
    <div class="modal-content" style="max-width: 500px;">
      <span class="material-symbols-outlined modal-close" onclick="window.closeFormModal()">close</span>
      <h2 id="form-title" style="margin-top: 0; color: var(--primary);">新增分校</h2>
      <form id="branch-form">
        <input type="hidden" id="branch-id">
        <div class="form-grid">
          <div class="form-group full-width"><label>分校名稱 <span style="color:red">*</span></label><input type="text" id="name" required placeholder="例：台北旗艦校"></div>
          <div class="form-group full-width"><label>收據專屬抬頭</label><input type="text" id="receipt_header" placeholder="例：陽禾語文文理短期補習班"></div>
          <div class="form-group"><label>聯絡電話</label><input type="text" id="phone"></div>
          <div class="form-group full-width"><label>地址</label><input type="text" id="address"></div>
          <div class="form-group full-width"><label>退費須知 (印於收據)</label><textarea id="receipt_footer" rows="3" style="width:100%; border:1px solid var(--border); border-radius:6px; padding:10px;"></textarea></div>
        </div>
        <div class="actions" style="margin-top: 25px;"><button type="button" class="btn btn-cancel" onclick="window.closeFormModal()">取消</button><button type="submit" class="btn btn-primary" id="submit-btn">儲存</button></div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="custom-dialog" style="z-index: 9999;"><div class="modal-content" style="max-width: 400px; text-align: center; padding: 30px;"><div id="dialog-icon" style="margin-bottom: 15px;"></div><h3 id="dialog-title" style="margin-top: 0; color: var(--text-main); font-size: 20px;">提示</h3><p id="dialog-message" style="color: var(--text-light); margin-bottom: 25px; line-height: 1.5; font-size: 15px;"></p><div style="display: flex; gap: 10px; justify-content: center;"><button class="btn btn-cancel" id="dialog-btn-cancel" style="display: none;">取消</button><button class="btn btn-primary" id="dialog-btn-confirm">確定</button></div></div></div>

  <script type="module" src="./app.js"></script>
  <script>document.getElementById('header-date').textContent = new Date().toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });</script>
</body>
</html>
